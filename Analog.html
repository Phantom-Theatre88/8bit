<body>
<main class="app"><header class="topbar"><div class="title"><div class="bolt">⚡</div><h1>電気を見える化</h1><span id="lessonTitle">｜V・W・Aの法則</span></div><div class="top-actions"><div class="modes"><button type="button" class="mode active" data-mode="field">現場モード（V・W・A）</button><button type="button" class="mode" data-mode="basic">基礎モード（V・I・R）</button></div><div class="group-divider"></div><div class="page-actions"><button type="button" class="help" id="helpBtn">ⓘ 使い方</button><a class="action-link" href="SinglePhase3.html">次へ ▶</a></div></div></header><section class="layout"><section class="panel left"><div class="section-head">① 求めたい値を選ぶ</div><div class="section-sub">求めたい項目を1つ選び、残り2項目は数値入力または下のボタンで設定します。</div><div class="target-row" id="targetRow"></div><div id="inputCards"></div></section><section class="panel center"><div class="formula-stack"><div class="formula-board"><div class="formula-item" id="formulaTop"></div><div class="formula-divider"><div class="operator divide-left">÷</div><div class="operator divide-right">÷</div></div><div class="formula-bottom"><div class="formula-item bottom-left" id="formulaLeft"></div><div class="multiply">×</div><div class="formula-item bottom-right" id="formulaRight"></div></div></div><div class="formula-caption" id="activeFormula"></div><div class="flow-note" id="flowNote"></div></div></section><section class="panel right"><div class="section-head" id="rightHead">③ AUTOの答えと現場へのつながり</div><div class="right-grid" id="rightContent"></div></section></section><section class="panel teacher"><img class="teacher-character" src="assets/analog_teacher_pointing.webp" alt="照明教材の先生"><div class="teacher-intro-wrap"><h3>先生のひとこと</h3><div class="speech" id="teacherIntro"></div></div><div class="teacher-card current" id="teacherCurrent"></div><div class="teacher-card example" id="teacherExample1"></div><div class="teacher-card example" id="teacherExample2"></div></section><footer class="bottomnav"><a class="home" href="index.html">⌂ TOPへ</a><div class="brand">8bit Lighting Study</div></footer></main><dialog class="help-dialog" id="helpDialog"><div class="help-head"><h2>使い方</h2><button class="help-close" id="helpClose" type="button">閉じる</button></div><div class="help-body"><ol><li>求めたい値を1つ選びます。選んだ項目はAUTOになります。</li><li>残り2項目を、数値入力またはボタンで設定します。</li><li>中央のT字図で式を確認します。</li><li>右側の「AUTOの答え」で結果を確認します。</li><li>下の先生エリアで、なぜその答えになるのかと他の計算例を確認します。</li></ol></div></dialog>
<script>
(()=>{const $=id=>document.getElementById(id);const configs={field:{title:'｜V・W・Aの法則',keys:['P','V','I'],target:'I',values:{P:500,V:100,I:5},items:{P:{name:'電力 P',label:'電力（W）',desc:'灯体の消費電力の合計',unit:'W',color:'var(--p)',presets:[100,300,500,1000]},V:{name:'電圧 V',label:'電圧（V）',desc:'使用する電源電圧',unit:'V',color:'var(--v)',presets:[50,100,200,230]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電流',unit:'A',color:'var(--i)',presets:[1,5,10,20]}}},basic:{title:'｜V・I・Rの法則',keys:['V','I','R'],target:'V',values:{V:20,I:2,R:10},items:{V:{name:'電圧 V',label:'電圧（V）',desc:'電気を押し出す力',unit:'V',color:'var(--v)',presets:[3,6,12,24]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電気の量',unit:'A',color:'var(--i)',presets:[0.5,1,2,5]},R:{name:'抵抗 R',label:'抵抗（Ω）',desc:'電気の流れにくさ',unit:'Ω',color:'var(--r)',presets:[2,5,10,20]}}}};let mode='field',target=configs.field.target;const fmt=(k,v)=>k==='I'?Number(v).toFixed(2):Number(v).toFixed(1).replace(/\.0$/,'');function calculate(){const c=configs[mode],[a,b,d]=c.keys;if(target===a)c.values[a]=c.values[b]*c.values[d];else if(target===b)c.values[b]=c.values[d]?c.values[a]/c.values[d]:0;else c.values[d]=c.values[b]?c.values[a]/c.values[b]:0}function formulaItem(k){const c=configs[mode].items[k],auto=k===target;return `<div class="formula-symbol" style="color:${c.color}">${k}</div><div class="formula-label">${c.label}</div><div class="formula-value" style="--accent:${c.color};color:${c.color}">${fmt(k,configs[mode].values[k])}</div><div class="auto-mark" style="color:${c.color}">${auto?'AUTO':''}</div>`}function renderInputs(){const c=configs[mode];$('targetRow').innerHTML=c.keys.map(k=>`<button class="target-btn ${k===target?'active':''}" data-key="${k}" style="--accent:${c.items[k].color}">${c.items[k].name}</button>`).join('');$('inputCards').innerHTML=c.keys.map(k=>{const x=c.items[k],auto=k===target;return `<div class="input-card ${auto?'auto':''}" style="--accent:${x.color}"><div class="input-title">${x.name}<span class="state">${auto?'AUTO':'入力'}</span></div><div class="input-desc">${x.desc}</div><div class="input-row"><input data-key="${k}" type="number" step="0.01" ${auto?'readonly value="" placeholder="AUTO"':`value="${fmt(k,c.values[k])}"`}><span class="unit">${x.unit}</span></div><div class="quick">${x.presets.map(v=>`<button data-key="${k}" data-value="${v}" ${auto?'disabled':''}>${v}${x.unit}</button>`).join('')}</div></div>`}).join('');document.querySelectorAll('.target-btn').forEach(b=>b.onclick=()=>{target=b.dataset.key;calculate();render()});document.querySelectorAll('#inputCards input').forEach(i=>i.oninput=()=>{if(i.readOnly)return;c.values[i.dataset.key]=Number(i.value)||0;calculate();renderFormula();renderRight();renderTeacher()});document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>{if(b.disabled)return;c.values[b.dataset.key]=Number(b.dataset.value);calculate();render()})}function renderFormula(){const c=configs[mode],[a,b,d]=c.keys;$('formulaTop').innerHTML=formulaItem(a);$('formulaLeft').innerHTML=formulaItem(b);$('formulaRight').innerHTML=formulaItem(d);$('formulaTop').classList.toggle('auto',target===a);$('formulaLeft').classList.toggle('auto',target===b);$('formulaRight').classList.toggle('auto',target===d);const col=k=>c.items[k].color;$('activeFormula').innerHTML=target===a?`<span style="color:${col(a)}">${a}</span> = <span style="color:${col(b)}">${b}</span> × <span style="color:${col(d)}">${d}</span>`:target===b?`<span style="color:${col(b)}">${b}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(d)}">${d}</span>`:`<span style="color:${col(d)}">${d}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(b)}">${b}</span>`;$('flowNote').textContent=`${c.keys.filter(k=>k!==target).join(' と ')} を入力すると、${c.items[target].name} が自動計算されます。`}function renderRight(){const c=configs[mode],x=c.items[target],v=c.values[target];if(mode==='field'){const I=c.values.I;const old=$('breaker'),breaker=Number(old?old.value:15),remain=breaker-I,ratio=breaker?I/breaker:0;$('rightHead').textContent='③ AUTOの答えと現場へのつながり';$('rightContent').innerHTML=`<div class="result-card answer-card" style="--accent:${x.color}"><div><div class="answer-kicker">AUTOの答え</div><div class="answer-label">${x.label}</div><div class="answer-value">${fmt(target,v)} ${x.unit}</div><div class="answer-basis">${c.keys.filter(k=>k!==target).map(k=>`${k}=${fmt(k,c.values[k])}${c.items[k].unit}`).join('、')} のとき</div></div></div><div class="result-card"><div class="result-title">ブレーカー容量と余裕</div><div class="capacity-grid"><div><label>ブレーカー容量</label><select id="breaker">${[10,15,20,30,60].map(n=>`<option ${n===breaker?'selected':''}>${n}</option>`).join('')}</select></div><div class="summary"><div class="summary-box"><div class="summary-label">残り容量</div><div class="summary-value">${Math.max(0,remain).toFixed(2)} A</div></div><div class="summary-box"><div class="summary-label">使用率</div><div class="summary-value">${(ratio*100).toFixed(1)}%</div></div></div></div><div class="bar"><span style="width:${Math.min(100,ratio*100)}%"></span></div><div class="scale"><span>0%</span><span>50%</span><span>100%</span></div><div class="status">${ratio>1?'⚠ 容量を超えています':ratio>.8?'△ 余裕が少ないです':'✓ 余裕があります'}</div></div><div class="result-card check">✓ 電流がブレーカー容量を超えていないか確認する。<br>✓ 配線の許容電流も確認する。</div>`;$('breaker').onchange=()=>{renderRight();renderTeacher()}}else{$('rightHead').textContent='③ 基礎モードの答え';$('rightContent').innerHTML=`<div class="result-card answer-card" style="--accent:${x.color}"><div><div class="answer-kicker">AUTOの答え</div><div class="answer-label">${x.label}</div><div class="answer-value">${fmt(target,v)} ${x.unit}</div><div class="answer-basis">${c.keys.filter(k=>k!==target).map(k=>`${k}=${fmt(k,c.values[k])}${c.items[k].unit}`).join('、')} のとき</div></div></div><div class="result-card basic-note">電圧・電流・抵抗のうち、2つを入力すると残り1つが求まります。詳しい意味や仕組みは、別の説明ページで扱います。</div>`}}function fieldExplanation(k){const c=configs.field.values;if(k==='I')return `<small>操作後の例：電流 I をAUTOにした場合</small><strong>${fmt('P',c.P)}Wの灯体を${fmt('V',c.V)}Vで使うと、<br><span class="p">${fmt('P',c.P)}</span> ÷ <span class="v">${fmt('V',c.V)}</span> = <span class="i">${fmt('I',c.I)}A</span></strong><br>つまり、この灯体を点灯すると<br><span class="i">ブレーカーには${fmt('I',c.I)}A流れます。</span>`;if(k==='V')return `<small>操作後の例：電圧 V をAUTOにした場合</small><strong>${fmt('P',c.P)}Wを${fmt('I',c.I)}Aで使うには、<br><span class="p">${fmt('P',c.P)}</span> ÷ <span class="i">${fmt('I',c.I)}</span> = <span class="v">${fmt('V',c.V)}V</span></strong><br><span class="v">${fmt('V',c.V)}Vの電源が必要です。</span>`;return `<small>操作後の例：電力 P をAUTOにした場合</small><strong>${fmt('V',c.V)}Vで${fmt('I',c.I)}A流れるなら、<br><span class="v">${fmt('V',c.V)}</span> × <span class="i">${fmt('I',c.I)}</span> = <span class="p">${fmt('P',c.P)}W</span></strong><br>この回路では<span class="p">${fmt('P',c.P)}W</span>使っています。`}function basicExplanation(k){const c=configs.basic.values;if(k==='V')return `<small>電圧 V をAUTOにした場合</small><strong><span class="i">${fmt('I',c.I)}A</span> × <span class="r">${fmt('R',c.R)}Ω</span> = <span class="v">${fmt('V',c.V)}V</span></strong><br>この回路に必要な電圧です。`;if(k==='I')return `<small>電流 I をAUTOにした場合</small><strong><span class="v">${fmt('V',c.V)}V</span> ÷ <span class="r">${fmt('R',c.R)}Ω</span> = <span class="i">${fmt('I',c.I)}A</span></strong><br>回路に流れる電流です。`;return `<small>抵抗 R をAUTOにした場合</small><strong><span class="v">${fmt('V',c.V)}V</span> ÷ <span class="i">${fmt('I',c.I)}A</span> = <span class="r">${fmt('R',c.R)}Ω</span></strong><br>電気の流れにくさです。`}function renderTeacher(){if(mode==='field'){$('teacherIntro').innerHTML=`【初期表示】<br>「この回路、あと何台つなげる？」<br>「この灯体は何A流れる？」<br><br>現場では、灯体をつなぐ前にブレーカー容量やケーブル容量を確認します。<br>まずは求めたい値を選んでみましょう。`;$('teacherCurrent').innerHTML=fieldExplanation(target);const others=['P','V','I'].filter(k=>k!==target);$('teacherExample1').innerHTML=fieldExplanation(others[0]);$('teacherExample2').innerHTML=fieldExplanation(others[1]);}else{$('teacherIntro').innerHTML=`電圧・電流・抵抗は、回路の基本的な関係です。<br><br>求めたい値を1つ選び、残り2つを入力してみましょう。`;$('teacherCurrent').innerHTML=basicExplanation(target);const others=['V','I','R'].filter(k=>k!==target);$('teacherExample1').innerHTML=basicExplanation(others[0]);$('teacherExample2').innerHTML=basicExplanation(others[1]);}}function render(){const c=configs[mode];$('lessonTitle').textContent=c.title;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));renderInputs();renderFormula();renderRight();renderTeacher()}document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;target=configs[mode].target;calculate();render()});$('helpBtn').onclick=()=>$('helpDialog').showModal();$('helpClose').onclick=()=>$('helpDialog').close();$('helpDialog').onclick=e=>{if(e.target===$('helpDialog'))$('helpDialog').close()};calculate();render();})();
</script>
