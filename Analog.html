*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text)}body{font-family:"Hiragino Sans","Yu Gothic",Meiryo,system-ui,-apple-system,sans-serif;padding:4px;overflow:hidden}button,input,select{font:inherit}.app{width:min(1500px,100%);height:100%;margin:auto;display:grid;grid-template-rows:40px minmax(0,1fr) 146px 28px}.topbar{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 9px;border:1px solid #242a30;border-radius:10px 10px 0 0;background:linear-gradient(#111418,#0b0d10)}.title{display:flex;align-items:center;gap:8px;min-width:0}.bolt{font-size:21px;color:#ffd000}.title h1{margin:0;font-size:20px;white-space:nowrap}.title span{font-size:12px;color:#d0d5da;white-space:nowrap}.top-actions{display:flex;align-items:center;gap:7px}.modes,.page-actions{display:flex;gap:5px}.group-divider{width:1px;height:22px;background:#3c434a}.mode,.action-link,.help{height:28px;padding:0 9px;border-radius:7px;border:1px solid #424950;color:#ddd;background:#171a1e;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}.mode.active{color:#ffbf3d;border-color:#c77a00}.mode[data-mode="basic"].active{color:#d59aff;border-color:#8f4bc7}.action-link{border-color:#59616a;color:#fff}.layout{display:grid;grid-template-columns:31% 36% 33%;gap:4px;padding:4px;border-left:1px solid #242a30;border-right:1px solid #242a30;background:#0b0d10;min-height:0}.panel{background:linear-gradient(#171a1e,#111418);border:1px solid var(--line);border-radius:8px;box-shadow:inset 0 0 15px #0006}.left,.center,.right{padding:7px;overflow:hidden}.section-head{font-size:15px;font-weight:800;margin-bottom:2px}.section-sub{font-size:11px;color:var(--muted);margin-bottom:5px;line-height:1.3}.target-row{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:5px}.target-btn{height:29px;border:1px solid #454c53;border-radius:6px;background:#15191d;color:#ddd;font-weight:800;cursor:pointer}.target-btn.active{border-colo (--accent);box-shadow:0 0 14px color-mix(in srgb,var(--accent) 50%,transparent)}.auto-mark{height:12px;margin-top:2px;font-size:9px;font-weight:800}.formula-divider{position:relative;width:88%;height:52px}.formula-divider:before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:#d7dde2}.formula-divider:after{content:"";position:absolute;left:50%;top:50%;width:2px;height:98px;background:#d7dde2}.operator{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:24px;color:#ff4a40;background:#0d1013;padding:0 5px}.divide-left{left:23%}.divide-right{left:77%}.formula-bottom{width:100%;display:grid;grid-template-columns:1fr 52px 1fr;align-items:end;justify-items:center;position:relative;z-index:2}.bottom-left{grid-column:1}.bottom-right{grid-column:3}.multiply{grid-column:2;font-size:27px;color:#ff4a40;background:#0d1013;padding:2px 6px;margin-bottom:8px}.formula-caption{margin-top:6px;border:1px solid #444b52;border-radius:7px;padding:6px 9px;background:#0e1013;text-align:center;font-size:13px;font-weight:800}.flow-note{text-align:center;margin-top:5px;font-size:11px;color:#dfe4e8}.right-grid{display:grid;gap:4px}.result-card{border:1px solid #3a4046;border-radius:8px;background:#121519;padding:6px}.answer-card{min-height:112px;display:grid;place-items:center;text-align:center;border-color:var(--accent);box-shadow:0 0 14px color-mix(in srgb,var(--accent) 25%,transparent)}.answer-kicker{font-size:13px;font-weight:900;color:var(--accent)}.answer-label{font-size:17px;font-weight:900;margin-top:4px}.answer-value{font-size:35px;font-weight:900;color:var(--accent);margin-top:4px}.answer-basis{font-size:11px;color:#d5dbe1;margin-top:3px}.result-title{font-size:13px;font-weight:800;color:#ffc247;margin-bottom:3px}.capacity-grid{display:grid;grid-template-columns:110px 1fr;gap:7px;align-items:center}.capacity-grid select{width:100%;height:31px;margin-top:3px;background:#15191d;color:#fff;border:1px solid #454c53;border-radius:6px;padding:0 6px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:5px}.summary-box{padding:5px;border-left:1px solid #3a4046}.summary-box:first-child{border-left:0}.summary-label{font-size:11px}.summary-value{font-size:23px;font-weight:900;color:var(--ok);margin-top:1px}.bar{height:11px;border-radius:7px;border:1px solid #555;background:#090b0d;overflow:hidden;margin-top:4px}.bar span{display:block;height:100%;background:linear-gradient(90deg,#47c82e,#77e85e)}.scale{display:flex;justify-content:space-between;font-size:9px;margin-top:2px}.status{font-size:11px;font-weight:800;color:var(--ok);margin-top:3px}.check,.basic-note{font-size:11px;line-height:1.35}.teacher{display:grid;grid-template-columns:125px 1.1fr 1fr .68fr .68fr;gap:8px;align-items:stretch;margin:0 4px;padding:7px 9px;min-height:0}.teacher-character{width:120px;height:132px;object-fit:cover;object-position:48% 14%;align-self:end}.teacher-intro-wrap{display:flex;flex-direction:column;min-width:0}.teacher h3{margin:0 0 4px;color:#ffd04d;font-size:18px}.speech{position:relative;flex:1;border-radius:12px;background:#f2e4b2;color:#151515;padding:9px 11px;font-size:11.5px;line-height:1.42;font-weight:700}.speech:before{content:"";position:absolute;left:-12px;top:24px;border-top:9px solid transparent;border-bottom:9px solid transparent;border-right:13px solid #f2e4b2}.teacher-card{border-radius:10px;background:#f2f2f2;color:#161616;padding:9px 10px;font-size:11.5px;line-height:1.4;display:flex;flex-direction:column;justify-content:center;overflow:hidden}.teacher-card small{display:block;color:#555;margin-bottom:4px;font-size:10px}.teacher-card strong{font-size:14px}.teacher-card .p{color:var(--p);font-weight:900}.teacher-card .v{color:var(--v);font-weight:900}.teacher-card .i{color:var(--i);font-weight:900}.teacher-card .r{color:var(--r);font-weight:900}.teacher-card .ok{color:var(--ok);font-weight:900}.teacher-card h4{margin:0 0 5px;font-size:11px}.teacher-card.example{justify-content:flex-start}.bottomnav{display:flex;align-items:center;justify-content:space-between;padding:2px 7px;border:1px solid #242a30;border-radius:0 0 10px 10px;background:#0d1013;font-size:10px}.home{color:#fff;text-decoration:none;border:1px solid #444b52;border-radius:6px;padding:3px 7px}.brand{color:#aaa}.help-dialog{width:min(560px,calc(100% - 32px));border:1px solid #59616a;border-radius:12px;background:#111418;color:#f4f6f8;padding:0;box-shadow:0 20px 70px #000c}.help-dialog::backdrop{background:#000a}.help-head{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid #343a41}.help-head h2{margin:0;font-size:19px}.help-close{border:1px solid #555d65;border-radius:7px;background:#1a1e22;color:#fff;padding:5px 10px;cursor:pointer}.help-body{padding:14px 18px 17px;font-size:14px;line-height:1.7}.help-body ol{margin:0;padding-left:22px}@media(max-width:1100px){body{overflow:auto}.app{height:auto;grid-template-rows:auto}.topbar{align-items:flex-start}.top-actions{flex-wrap:wrap;justify-content:flex-end}.layout{grid-template-columns:1fr}.left,.center,.right{overflow:visible}.teacher{grid-template-columns:105px 1fr;min-height:auto}.teacher-character{width:100px;height:125px}.teacher-card{grid-column:2}.speech:before{display:none}}

<body>
<main class="app">
<header class="topbar"><div class="title"><div class="bolt">⚡</div><h1>電気を見える化</h1><span id="lessonTitle">｜V・W・Aの法則</span></div><div class="top-actions"><div class="modes"><button type="button" class="mode active" data-mode="field">現場モード（V・W・A）</button><button type="button" class="mode" data-mode="basic">基礎モード（V・I・R）</button></div><div class="group-divider"></div><div class="page-actions"><button type="button" class="help" id="helpBtn">ⓘ 使い方</button><a class="action-link" href="SinglePhase3.html">次へ ▶</a></div></div></header>
<section class="layout"><section class="panel left"><div class="section-head">① 求めたい値を選ぶ</div><div class="section-sub">求めたい項目を1つ選び、残り2項目は数値入力または下のボタンで設定します。</div><div class="target-row" id="targetRow"></div><div id="inputCards"></div></section><section class="panel center"><div class="formula-stack"><div class="formula-board"><div class="formula-item" id="formulaTop"></div><div class="formula-divider"><div class="operator divide-left">÷</div><div class="operator divide-right">÷</div></div><div class="formula-bottom"><div class="formula-item bottom-left" id="formulaLeft"></div><div class="multiply">×</div><div class="formula-item bottom-right" id="formulaRight"></div></div></div><div class="formula-caption" id="activeFormula"></div><div class="flow-note" id="flowNote"></div></div></section><section class="panel right"><div class="section-head" id="rightHead">③ AUTOの答えと現場へのつながり</div><div class="right-grid" id="rightContent"></div></section></section>
<section class="panel teacher"><img class="teacher-character" src="assets/analog_teacher_pointing.webp" alt="照明教材の先生"><div class="teacher-intro-wrap"><h3>先生のひとこと</h3><div class="speech" id="teacherIntro"></div></div><div class="teacher-card current" id="teacherCurrent"></div><div class="teacher-card example" id="teacherExample1"></div><div class="teacher-card example" id="teacherExample2"></div></section>
<footer class="bottomnav"><a class="home" href="index.html">⌂ TOPへ</a><div class="brand">8bit Lighting Study</div></footer>
</main>
<dialog class="help-dialog" id="helpDialog"><div class="help-head"><h2>使い方</h2><button class="help-close" id="helpClose" type="button">閉じる</button></div><div class="help-body"><ol><li>求めたい値を1つ選びます。選んだ項目はAUTOになります。</li><li>残り2項目を、数値入力またはボタンで設定します。</li><li>中央のT字図で式を確認します。</li><li>右側の「AUTOの答え」で結果を確認します。</li><li>下の先生エリアで、なぜその答えになるのかと他の計算例を確認します。</li></ol></div></dialog>
<script>
(()=>{
const $=id=>document.getElementById(id);
const configs={field:{title:'｜V・W・Aの法則',keys:['P','V','I'],target:'I',values:{P:500,V:100,I:5},items:{P:{name:'電力 P',label:'電力（W）',desc:'灯体の消費電力の合計',unit:'W',color:'var(--p)',presets:[100,300,500,1000]},V:{name:'電圧 V',label:'電圧（V）',desc:'使用する電源電圧',unit:'V',color:'var(--v)',presets:[50,100,200,230]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電流',unit:'A',color:'var(--i)',presets:[1,5,10,20]}}},basic:{title:'｜V・I・Rの法則',keys:['V','I','R'],target:'V',values:{V:20,I:2,R:10},items:{V:{name:'電圧 V',label:'電圧（V）',desc:'電気を押し出す力',unit:'V',color:'var(--v)',presets:[3,6,12,24]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電気の量',unit:'A',color:'var(--i)',presets:[0.5,1,2,5]},R:{name:'抵抗 R',label:'抵抗（Ω）',desc:'電気の流れにくさ',unit:'Ω',color:'var(--r)',presets:[2,5,10,20]}}}};
let mode='field',target=configs.field.target,hasInteracted=false;
const fmt=(k,v)=>k==='I'?Number(v).toFixed(2):Number(v).toFixed(1).replace(/\.0$/,'');
function calculate(){const cfg=configs[mode],[a,b,c]=cfg.keys;if(target===a)cfg.values[a]=cfg.values[b]*cfg.values[c];else if(target===b)cfg.values[b]=cfg.values[c]?cfg.values[a]/cfg.values[c]:0;else cfg.values[c]=cfg.values[b]?cfg.values[a]/cfg.values[b]:0;}
function formulaItem(k){const cfg=configs[mode],c=cfg.items[k],auto=k===target;return `<div class="formula-symbol" style="color:${c.color}">${k}</div><div class="formula-label">${c.label}</div><div class="formula-value" style="--accent:${c.color};color:${c.color}">${fmt(k,cfg.values[k])}</div><div class="auto-mark" style="color:${c.color}">${auto?'AUTO':''}</div>`;}
function renderInputs(){const cfg=configs[mode];$('targetRow').innerHTML=cfg.keys.map(k=>`<button class="target-btn ${k===target?'active':''}" data-key="${k}" style="--accent:${cfg.items[k].color}">${cfg.items[k].name}</button>`).join('');$('inputCards').innerHTML=cfg.keys.map(k=>{const c=cfg.items[k],auto=k===target;return `<div class="input-card ${auto?'auto':''}" style="--accent:${c.color}"><div class="input-title">${c.name}<span class="state">${auto?'AUTO':'入力'}</span></div><div class="input-desc">${c.desc}</div><div class="input-row"><input data-key="${k}" inputmode="decimal" type="number" step="0.01" ${auto?'readonly value="" placeholder="AUTO"':`value="${fmt(k,cfg.values[k])}"`}><span class="unit">${c.unit}</span></div><div class="quick">${c.presets.map(x=>`<button data-key="${k}" data-value="${x}" ${auto?'disabled':''}>${x}${c.unit}</button>`).join('')}</div></div>`}).join('');document.querySelectorAll('.target-btn').forEach(b=>b.onclick=()=>{target=b.dataset.key;hasInteracted=true;calculate();render();});document.querySelectorAll('input[data-key]').forEach(inp=>inp.oninput=()=>{if(inp.readOnly)return;configs[mode].values[inp.dataset.key]=Number(inp.value)||0;hasInteracted=true;calculate();renderFormula();renderRight();renderTeacher();});document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>{if(b.disabled)return;configs[mode].values[b.dataset.key]=Number(b.dataset.value);hasInteracted=true;calculate();render();});}
function renderFormula(){const cfg=configs[mode],[a,b,c]=cfg.keys;$('formulaTop').innerHTML=formulaItem(a);$('formulaLeft').innerHTML=formulaItem(b);$('formulaRight').innerHTML=formulaItem(c);$('formulaTop').classList.toggle('auto',target===a);$('formulaLeft').classList.toggle('auto',target===b);$('formulaRight').classList.toggle('auto',target===c);const col=k=>cfg.items[k].color;$('activeFormula').innerHTML=target===a?`<span style="color:${col(a)}">${a}</span> = <span style="color:${col(b)}">${b}</span> × <span style="color:${col(c)}">${c}</span>`:target===b?`<span style="color:${col(b)}">${b}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(c)}">${c}</span>`:`<span style="color:${col(c)}">${c}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(b)}">${b}</span>`;$('flowNote').textContent=`${cfg.keys.filter(k=>k!==target).join(' と ')} を入力すると、${cfg.items[target].name} が自動計算されます。`;}
function renderRight(){const cfg=configs[mode],c=cfg.items[target],others=cfg.keys.filter(k=>k!==target);$('rightHead').textContent=mode==='field'?'③ AUTOの答えと現場へのつながり':'③ AUTOの答え';let html=`<div class="result-card answer-card" style="--accent:${c.color}"><div><div class="answer-kicker">AUTOの答え</div><div class="answer-label">${c.label}</div><div class="answer-value">${fmt(target,cfg.values[target])} ${c.unit}</div><div class="answer-basis">${others.map(k=>`${k}=${fmt(k,cfg.values[k])}${cfg.items[k].unit}`).join('、')} のとき</div></div></div>`;if(mode==='field'){const I=cfg.values.I,old=$('breaker'),breaker=Number(old?old.value:15),remain=breaker-I,ratio=breaker?I/breaker:0;html+=`<div class="result-card"><div class="result-title">ブレーカー容量と余裕</div><div class="capacity-grid"><div><label>ブレーカー容量</label><select id="breaker"><option ${breaker===10?'selected':''}>10</option><option ${breaker===15?'selected':''}>15</option><option ${breaker===20?'selected':''}>20</option><option ${breaker===30?'selected':''}>30</option><option ${breaker===60?'selected':''}>60</option></select></div><div class="summary"><div class="summary-box"><div class="summary-label">残り容量</div><div class="summary-value">${Math.max(0,remain).toFixed(2)} A</div></div><div class="summary-box"><div class="summary-label">使用率</div><div class="summary-value">${(ratio*100).toFixed(1)}%</div></div></div></div><div class="bar"><span style="width:${Math.min(100,ratio*100)}%"></span></div><div class="scale"><span>0%</span><span>50%</span><span>100%</span></div><div class="status">${ratio>1?'⚠ 容量を超えています':ratio>.8?'△ 余裕が少ないです':'✓ 余裕があります'}</div></div><div class="result-card check">✓ 電流がブレーカー容量を超えていないか確認する。<br>✓ 配線の許容電流も確認する。</div>`;}else html+=`<div class="result-card basic-note">電圧・電流・抵抗のうち、2つを入力すると残り1つが求まります。</div>`;$('rightContent').innerHTML=html;const br=$('breaker');if(br)br.onchange=()=>{renderRight();renderTeacher();};}
function explanation(k){const cfg=configs[mode],v=cfg.values;if(mode==='field'){if(k==='I')return {title:'電流 I をAUTOにした場合',body:`${fmt('P',v.P)}Wの灯体を${fmt('V',v.V)}Vで使うと、<br><strong><span class="p">${fmt('P',v.P)}</span> ÷ <span class="v">${fmt('V',v.V)}</span> = <span class="i">${fmt('I',v.I)}A</span></strong><br><br>つまり、この灯体を点灯すると<br><span class="i">ブレーカーには${fmt('I',v.I)}A流れます。</span>`};if(k==='V')return {title:'電圧 V をAUTOにした場合',body:`${fmt('P',v.P)}Wを${fmt('I',v.I)}Aで使うには、<br><strong><span class="p">${fmt('P',v.P)}</span> ÷ <span class="i">${fmt('I',v.I)}</span> = <span class="v">${fmt('V',v.V)}V</span></strong><br><br><span class="v">${fmt('V',v.V)}Vの電源が必要です。</span>`};return {title:'電力 P をAUTOにした場合',body:`${fmt('V',v.V)}Vで${fmt('I',v.I)}A流れるなら、<br><strong><span class="v">${fmt('V',v.V)}</span> × <span class="i">${fmt('I',v.I)}</span> = <span class="p">${fmt('P',v.P)}W</span></strong><br><br>この回路では<span class="p">${fmt('P',v.P)}W</span>使っています。`};}if(k==='V')return {title:'電圧 V をAUTOにした場合',body:`<strong><span class="i">${fmt('I',v.I)}</span> × <span class="r">${fmt('R',v.R)}</span> = <span class="v">${fmt('V',v.V)}V</span></strong>`};if(k==='I')return {title:'電流 I をAUTOにした場合',body:`<strong><span class="v">${fmt('V',v.V)}</span> ÷ <span class="r">${fmt('R',v.R)}</span> = <span class="i">${fmt('I',v.I)}A</span></strong>`};return {title:'抵抗 R をAUTOにした場合',body:`<strong><span class="v">${fmt('V',v.V)}</span> ÷ <span class="i">${fmt('I',v.I)}</span> = <span class="r">${fmt('R',v.R)}Ω</span></strong>`};}
function renderTeacher(){const cfg=configs[mode];$('teacherIntro').innerHTML=mode==='field'?`<b>【初期表示】</b><br>「この回路、あと何台つなげる？」<br>「この灯体は何A流れる？」<br><br>現場では、灯体をつなぐ前にブレーカー容量やケーブル容量を確認します。<br>まずは求めたい値を選んでみましょう。`:`<b>【基礎モード】</b><br>電圧・電流・抵抗の関係を確認します。<br><br>求めたい値を選び、残り2つを入力してみましょう。`;const current=explanation(target);$('teacherCurrent').innerHTML=`<small>${hasInteracted?'操作後の説明':'現在の例'}：${current.title}</small>${current.body}`;const others=cfg.keys.filter(k=>k!==target),e1=explanation(others[0]),e2=explanation(others[1]);$('teacherExample1').innerHTML=`<h4>${e1.title}</h4>${e1.body}`;$('teacherExample2').innerHTML=`<h4>${e2.title}</h4>${e2.body}`;}
function render(){const cfg=configs[mode];$('lessonTitle').textContent=cfg.title;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));renderInputs();renderFormula();renderRight();renderTeacher();}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;target=configs[mode].target;hasInteracted=false;calculate();render();});$('helpBtn').onclick=()=>$('helpDialog').showModal();$('helpClose').onclick=()=>$('helpDialog').close();$('helpDialog').onclick=e=>{if(e.target===$('helpDialog'))$('helpDialog').close();};calculate();render();
})();
</script>
</body>
</html>
