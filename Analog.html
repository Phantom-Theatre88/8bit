<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>電気を見える化｜V・W・A / V・I・R</title>
<style>
:root{--bg:#080a0d;--panel:#111418;--line:#343a41;--text:#f4f6f8;--muted:#a9b0b8;--p:#ff8a00;--v:#55d62c;--i:#3597ff;--r:#b35cff;--ok:#55d62c;--warn:#ffd000;--danger:#ff3b30}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text)}body{font-family:"Hiragino Sans","Yu Gothic",Meiryo,system-ui,-apple-system,sans-serif;padding:6px;overflow:hidden}button,input,select{font:inherit}.app{width:min(1500px,100%);height:100%;margin:auto;display:grid;grid-template-rows:auto minmax(0,1fr) auto auto}.topbar{min-height:46px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 12px;border:1px solid #242a30;border-radius:12px 12px 0 0;background:linear-gradient(#111418,#0b0d10)}.title{display:flex;align-items:center;gap:10px}.bolt{font-size:25px;color:#ffd000}.title h1{margin:0;font-size:24px}.title span{font-size:14px;color:#d0d5da}.modes{display:flex;gap:8px}.mode{height:33px;padding:0 12px;border-radius:8px;border:1px solid #424950;color:#ddd;background:#171a1e}.mode.active{color:#ffbf3d;border-color:#c77a00}.mode[data-mode="basic"].active{color:#d59aff;border-color:#8f4bc7}.layout{display:grid;grid-template-columns:31% 36% 33%;gap:6px;padding:6px;border-left:1px solid #242a30;border-right:1px solid #242a30;background:#0b0d10;min-height:0}.panel{background:linear-gradient(#171a1e,#111418);border:1px solid var(--line);border-radius:10px;box-shadow:inset 0 0 18px #0006}.left,.center,.right{padding:10px;overflow:hidden}.section-head{font-size:17px;font-weight:800;margin-bottom:4px}.section-sub{font-size:13px;color:var(--muted);margin-bottom:8px}.target-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}.target-btn{height:36px;border:1px solid #454c53;border-radius:7px;background:#15191d;color:#ddd;font-weight:800}.target-btn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px color-mix(in srgb,var(--accent) 35%,transparent)}.input-card{--accent:#fff;border:1px solid #3a4046;border-left:5px solid var(--accent);border-radius:9px;background:#ffffff05;padding:8px 9px;margin-bottom:6px}.input-card.auto{box-shadow:0 0 16px color-mix(in srgb,var(--accent) 35%,transparent);border-color:var(--accent)}.input-title{font-size:15px;font-weight:800;color:var(--accent)}.input-desc{font-size:12px;margin-top:2px}.state{float:right;font-size:11px;padding:2px 7px;border-radius:10px;border:1px solid var(--accent);color:var(--accent)}.input-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-top:7px}.input-row input{height:41px;width:100%;border-radius:7px;border:1px solid #454c53;background:#090b0d;color:white;text-align:right;padding:0 12px;font-size:23px;font-weight:900}.input-card.auto input{color:var(--accent);border-color:var(--accent)}.input-card.auto input::placeholder{color:var(--accent);opacity:1;text-align:center;letter-spacing:.08em}.unit{font-size:16px;font-weight:800}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}.quick button{height:29px;border:1px solid #454c53;border-radius:6px;background:#1a1e22;color:#eee}.quick button.active{border-color:var(--accent);color:var(--accent)}.quick button:disabled{opacity:.35}.center{display:grid;place-items:center}.formula-stack{width:min(100%,520px)}.formula-board{display:grid;grid-template-rows:auto 70px auto;justify-items:center;padding:20px 24px 18px;border:1px solid #444b52;border-radius:16px;background:radial-gradient(circle at 50% 20%,#ffffff0a,transparent 50%),#0d1013}.formula-item{text-align:center;position:relative;z-index:2}.formula-symbol{font-size:29px;line-height:1;font-weight:900;color:var(--accent)}.formula-label{font-size:23px;font-weight:800;margin-top:4px}.formula-value{margin-top:7px;min-width:124px;padding:7px 13px;border-radius:8px;background:#050607;border:1px solid #32363b;color:var(--accent);font-size:32px;font-weight:900}.formula-item.auto .formula-value{border-color:var(--accent);box-shadow:0 0 18px color-mix(in srgb,var(--accent) 50%,transparent)}.auto-mark{display:none;margin-top:5px;font-size:11px;font-weight:800;color:var(--accent)}.formula-item.auto .auto-mark{display:block}.formula-divider{position:relative;width:88%;height:70px}.formula-divider:before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:#d7dde2}.formula-divider:after{content:"";position:absolute;left:50%;top:50%;width:2px;height:128px;background:#d7dde2}.operator{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:400;color:#ff4a40;background:#0d1013;padding:0 7px}.divide-left{left:23%}.divide-right{left:77%}.formula-bottom{width:100%;display:grid;grid-template-columns:1fr 66px 1fr;align-items:end;justify-items:center;position:relative;z-index:2}.bottom-left{grid-column:1}.bottom-right{grid-column:3}.multiply{grid-column:2;font-size:34px;font-weight:400;color:#ff4a40;background:#0d1013;padding:4px 8px;margin-bottom:12px}.formula-caption{margin-top:9px;border:1px solid #444b52;border-radius:8px;padding:9px 12px;background:#0e1013;text-align:center;font-size:15px;font-weight:800}.flow-note{text-align:center;margin-top:8px;font-size:13px;color:#dfe4e8}.right-grid{display:grid;gap:7px}.result-card{border:1px solid #3a4046;border-radius:9px;background:#121519;padding:9px}.result-title{font-size:15px;font-weight:800;color:#ffc247;margin-bottom:6px}.visual-top{display:grid;grid-template-columns:1fr 1fr;gap:7px}.bulb-box,.big-result{display:grid;place-items:center;min-height:175px;border-radius:7px;text-align:center}.bulb-box{background:radial-gradient(circle,#ffb02025,transparent 58%);overflow:hidden}.bulb-img{width:108px;height:170px;object-fit:contain;opacity:.88;filter:brightness(var(--bulb-brightness,1)) drop-shadow(0 0 var(--bulb-glow,18px) #ff9100cc)}.big-label{font-size:14px;font-weight:800;color:var(--accent)}.big-value{font-size:37px;font-weight:900;color:var(--accent);margin-top:8px}.capacity-grid{display:grid;grid-template-columns:130px 1fr;gap:12px;align-items:center}.capacity-grid select{width:100%;height:38px;margin-top:5px;background:#15191d;color:#fff;border:1px solid #454c53;border-radius:7px;padding:0 8px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px}.summary-box{padding:8px;border-left:1px solid #3a4046}.summary-box:first-child{border-left:0}.summary-label{font-size:13px}.summary-value{font-size:29px;font-weight:900;color:var(--ok);margin-top:4px}.bar{height:15px;border-radius:9px;border:1px solid #555;background:#090b0d;overflow:hidden;margin-top:7px}.bar span{display:block;height:100%;width:0;background:linear-gradient(90deg,#47c82e,#77e85e)}.scale{display:flex;justify-content:space-between;font-size:12px;margin-top:4px}.status{font-size:13px;font-weight:800;color:var(--ok);margin-top:7px}.check{font-size:13px;line-height:1.6}.basic-note{font-size:14px;line-height:1.7}.teacher{display:grid;grid-template-columns:95px 1fr;gap:14px;align-items:center;margin:0 6px 6px;padding:8px 14px;min-height:112px}.teacher-character{width:95px;height:100px;object-fit:cover;object-position:48% 14%;align-self:end}.teacher h3{margin:0 0 6px;color:#ffd04d;font-size:18px}.teacher p{margin:0;font-size:15px;line-height:1.55}.teacher .p{color:var(--p);font-weight:900}.teacher .v{color:var(--v);font-weight:900}.teacher .i{color:var(--i);font-weight:900}.teacher .r{color:var(--r);font-weight:900}.teacher .ok{color:var(--ok);font-weight:900}.bottomnav{min-height:38px;display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border:1px solid #242a30;border-radius:0 0 12px 12px;background:#0d1013;font-size:12px}.home{color:#fff;text-decoration:none;border:1px solid #444b52;border-radius:7px;padding:6px 10px}.brand{color:#aaa}@media(max-width:1100px){body{overflow:auto}.app{height:auto}.layout{grid-template-columns:1fr}.left,.center,.right{overflow:visible}.teacher{grid-template-columns:80px 1fr}.teacher-character{width:80px;height:90px}}
</style>
</head>
<body>
<main class="app">
<header class="topbar"><div class="title"><div class="bolt">⚡</div><h1>電気を見える化</h1><span id="lessonTitle">｜V・W・Aの法則</span></div><div class="modes"><button class="mode active" data-mode="field">現場モード（V・W・A）</button><button class="mode" data-mode="basic">基礎モード（V・I・R）</button></div></header>
<section class="layout">
<section class="panel left"><div class="section-head">① 求めたい値を選ぶ</div><div class="section-sub">求めたい項目を1つ選び、残り2項目は数値入力または下のボタンで設定します。</div><div class="target-row" id="targetRow"></div><div id="inputCards"></div></section>
<section class="panel center"><div class="formula-stack"><div class="formula-board"><div class="formula-item" id="formulaTop"></div><div class="formula-divider"><div class="operator divide-left">÷</div><div class="operator divide-right">÷</div></div><div class="formula-bottom"><div class="formula-item bottom-left" id="formulaLeft"></div><div class="multiply">×</div><div class="formula-item bottom-right" id="formulaRight"></div></div></div><div class="formula-caption" id="activeFormula"></div><div class="flow-note" id="flowNote"></div></div></section>
<section class="panel right"><div class="section-head" id="rightHead">② 現場での見方</div><div class="right-grid" id="rightContent"></div></section>
</section>
<section class="panel teacher"><img class="teacher-character" src="assets/analog_teacher_pointing.webp" alt="照明教材の先生"><div><h3>先生のひとこと</h3><p id="teacherText"></p></div></section>
<footer class="bottomnav"><a class="home" href="index.html">⌂ TOPへ</a><div class="brand">8bit Lighting Study</div></footer>
</main>
<script>
(()=>{
const $=id=>document.getElementById(id);
const configs={
field:{title:'｜V・W・Aの法則',keys:['P','V','I'],target:'I',values:{P:500,V:100,I:5},items:{P:{name:'電力 P',label:'電力（W）',desc:'灯体の消費電力の合計',unit:'W',color:'var(--p)',presets:[100,300,500,1000]},V:{name:'電圧 V',label:'電圧（V）',desc:'使用する電源電圧',unit:'V',color:'var(--v)',presets:[50,100,200,230]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電流',unit:'A',color:'var(--i)',presets:[1,5,10,20]}}},
basic:{title:'｜V・I・Rの法則',keys:['V','I','R'],target:'V',values:{V:20,I:2,R:10},items:{V:{name:'電圧 V',label:'電圧（V）',desc:'電気を押し出す力',unit:'V',color:'var(--v)',presets:[3,6,12,24]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電気の量',unit:'A',color:'var(--i)',presets:[.5,1,2,5]},R:{name:'抵抗 R',label:'抵抗（Ω）',desc:'電気の流れにくさ',unit:'Ω',color:'var(--r)',presets:[2,5,10,20]}}}
};
let mode='field',target=configs.field.target;
const fmt=(k,v)=>k==='I'?Number(v).toFixed(2):Number(v).toFixed(1).replace(/\.0$/,'');
function itemHTML(k,auto=false){const c=configs[mode].items[k],v=configs[mode].values[k];return `<div class="formula-symbol" style="--accent:${c.color};color:${c.color}">${k}</div><div class="formula-label">${c.label}</div><div class="formula-value" style="--accent:${c.color};color:${c.color}">${fmt(k,v)}</div><div class="auto-mark" style="color:${c.color}">${auto?'AUTO':''}</div>`}
function render(){const cfg=configs[mode];$('lessonTitle').textContent=cfg.title;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));$('targetRow').innerHTML=cfg.keys.map(k=>`<button class="target-btn ${k===target?'active':''}" data-target="${k}" style="--accent:${cfg.items[k].color}">${cfg.items[k].name}</button>`).join('');$('inputCards').innerHTML=cfg.keys.map(k=>{const c=cfg.items[k],auto=k===target;return `<div class="input-card ${auto?'auto':''}" style="--accent:${c.color}"><div class="input-title">${c.name}<span class="state">${auto?'AUTO':'入力'}</span></div><div class="input-desc">${c.desc}</div><div class="input-row"><input data-key="${k}" type="number" step="0.01" ${auto?'readonly placeholder="AUTO" value=""':`value="${fmt(k,cfg.values[k])}"`}><span class="unit">${c.unit}</span></div><div class="quick" data-key="${k}">${c.presets.map(x=>`<button data-v="${x}" ${auto?'disabled':''}>${x}${c.unit}</button>`).join('')}</div></div>`}).join('');$('formulaTop').innerHTML=itemHTML(cfg.keys[0],target===cfg.keys[0]);$('formulaLeft').innerHTML=itemHTML(cfg.keys[1],target===cfg.keys[1]);$('formulaRight').innerHTML=itemHTML(cfg.keys[2],target===cfg.keys[2]);['formulaTop','formulaLeft','formulaRight'].forEach((id,i)=>$(id).classList.toggle('auto',target===cfg.keys[i]));updateFormula();renderRight();bind();}
function updateFormula(){const cfg=configs[mode],a=cfg.keys[0],b=cfg.keys[1],c=cfg.keys[2],color=k=>cfg.items[k].color;$('activeFormula').innerHTML=target===a?`<span style="color:${color(a)}">${a}</span> = <span style="color:${color(b)}">${b}</span> × <span style="color:${color(c)}">${c}</span>`:target===b?`<span style="color:${color(b)}">${b}</span> = <span style="color:${color(a)}">${a}</span> ÷ <span style="color:${color(c)}">${c}</span>`:`<span style="color:${color(c)}">${c}</span> = <span style="color:${color(a)}">${a}</span> ÷ <span style="color:${color(b)}">${b}</span>`;$('flowNote').textContent=`${cfg.keys.filter(k=>k!==target).join(' と ')} を入力すると、${cfg.items[target].name} が自動計算されます。`;}
function calculate(){const cfg=configs[mode];document.querySelectorAll('input[data-key]').forEach(inp=>{if(inp.dataset.key!==target)cfg.values[inp.dataset.key]=Number(inp.value)||0});const [a,b,c]=cfg.keys;if(target===a)cfg.values[a]=cfg.values[b]*cfg.values[c];if(target===b)cfg.values[b]=cfg.values[c]?cfg.values[a]/cfg.values[c]:0;if(target===c)cfg.values[c]=cfg.values[b]?cfg.values[a]/cfg.values[b]:0;render();}
function bind(){document.querySelectorAll('.target-btn').forEach(b=>b.onclick=()=>{target=b.dataset.target;render()});document.querySelectorAll('input[data-key]').forEach(i=>i.oninput=calculate);document.querySelectorAll('.quick').forEach(g=>g.onclick=e=>{const b=e.target.closest('button');if(!b||b.disabled)return;configs[mode].values[g.dataset.key]=Number(b.dataset.v);calculate()});if($('breaker'))$('breaker').onchange=renderRight;}
function renderRight(){const cfg=configs[mode];if(mode==='field'){const P=cfg.values.P,I=cfg.values.I;const breaker=Number(($('breaker')&&$('breaker').value)||15),remain=breaker-I,ratio=breaker?I/breaker:0;$('rightHead').textContent='② 現場での見方';$('rightContent').innerHTML=`<div class="visual-top"><div class="result-card"><div class="result-title">電球の明るさ（イメージ）</div><div class="bulb-box"><img class="bulb-img" id="bulbImage" src="assets/Light.png" alt="白熱電球"></div></div><div class="result-card big-result" style="--accent:var(--i)"><div><div class="big-label">現在の電流 I</div><div class="big-value">${fmt('I',I)} A</div></div></div></div><div class="result-card"><div class="result-title">ブレーカー容量と余裕</div><div class="capacity-grid"><div><label>ブレーカー容量</label><select id="breaker"><option ${breaker===10?'selected':''}>10</option><option ${breaker===15?'selected':''}>15</option><option ${breaker===20?'selected':''}>20</option><option ${breaker===30?'selected':''}>30</option><option ${breaker===60?'selected':''}>60</option></select></div><div class="summary"><div class="summary-box"><div class="summary-label">残り容量</div><div class="summary-value">${Math.max(0,remain).toFixed(2)} A</div></div><div class="summary-box"><div class="summary-label">使用率</div><div class="summary-value">${(ratio*100).toFixed(1)}%</div></div></div></div><div class="bar"><span style="width:${Math.min(100,ratio*100)}%"></span></div><div class="scale"><span>0%</span><span>50%</span><span>100%</span></div><div class="status">${ratio>1?'⚠ 容量を超えています':ratio>.8?'△ 余裕が少ないです':'✓ 余裕があります'}</div></div><div class="result-card check">✓ 電流がブレーカー容量を超えていないか確認する。<br>✓ 配線の許容電流も確認する。</div>`;const level=Math.max(.2,Math.min(1,P/1000));setTimeout(()=>{if($('bulbImage')){$('bulbImage').style.setProperty('--bulb-brightness',(0.45+level*.85).toFixed(2));$('bulbImage').style.setProperty('--bulb-glow',(8+level*34)+'px')}},0);$('teacherText').innerHTML=`<span class="p">${Math.round(P)}W</span> と <span class="v">${fmt('V',cfg.values.V)}V</span> から、電流は <span class="i">${fmt('I',I)}A</span> です。 ブレーカーの残りは <span class="ok">${Math.max(0,remain).toFixed(2)}A</span> です。`;}else{const V=cfg.values.V,I=cfg.values.I,R=cfg.values.R,P=V*I;$('rightHead').textContent='② 基礎モードの結果';$('rightContent').innerHTML=`<div class="visual-top"><div class="result-card big-result" style="--accent:var(--v)"><div><div class="big-label">現在の電圧 V</div><div class="big-value">${fmt('V',V)} V</div></div></div><div class="result-card big-result" style="--accent:var(--i)"><div><div class="big-label">現在の電流 I</div><div class="big-value">${fmt('I',I)} A</div></div></div></div><div class="result-card"><div class="result-title">参考：電力</div><div class="summary"><div class="summary-box"><div class="summary-label">P = V × I</div><div class="summary-value" style="color:var(--p)">${fmt('P',P)} W</div></div><div class="summary-box"><div class="summary-label">抵抗 R</div><div class="summary-value" style="color:var(--r)">${fmt('R',R)} Ω</div></div></div></div><div class="result-card basic-note">電圧・電流・抵抗のうち、2つを入力すると残り1つが求まります。<br>詳しい意味や仕組みは、別の説明ページで扱います。</div>`;$('teacherText').innerHTML=target==='V'?`<span class="i">${fmt('I',I)}A</span> と <span class="r">${fmt('R',R)}Ω</span> から、電圧は <span class="v">${fmt('V',V)}V</span> です。`:target==='I'?`<span class="v">${fmt('V',V)}V</span> と <span class="r">${fmt('R',R)}Ω</span> から、電流は <span class="i">${fmt('I',I)}A</span> です。`:`<span class="v">${fmt('V',V)}V</span> と <span class="i">${fmt('I',I)}A</span> から、抵抗は <span class="r">${fmt('R',R)}Ω</span> です。`;}}
document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;target=configs[mode].target;render()});render();
})();
</script>
</body>
</html>
