<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>電気を見える化｜V・W・A / V・I・R</title><style>
:root{--bg:#080a0d;--panel:#111418;--line:#343a41;--text:#f4f6f8;--muted:#a9b0b8;--p:#ff8a00;--v:#55d62c;--i:#3597ff;--r:#b35cff;--ok:#55d62c}*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text)}body{font-family:"Hiragino Sans","Yu Gothic",Meiryo,system-ui,sans-serif;padding:4px;overflow:hidden}button,input,select{font:inherit}.app{width:min(1500px,100%);height:100%;margin:auto;display:grid;grid-template-rows:42px minmax(0,1fr) 148px 32px}.top{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;border:1px solid #242a30;border-radius:12px 12px 0 0;background:linear-gradient(#111418,#0b0d10)}.title,.actions,.modes,.pages{display:flex;align-items:center}.title{gap:9px}.title b{font-size:22px}.bolt{font-size:23px;color:#ffd000}.title span{font-size:13px;color:#d0d5da}.actions{gap:9px}.modes,.pages{gap:6px}.sep{width:1px;height:25px;background:#3c434a}.btn,.link{height:31px;padding:0 10px;border:1px solid #424950;border-radius:8px;background:#171a1e;color:#ddd;display:inline-flex;align-items:center;text-decoration:none;cursor:pointer}.btn.active{color:#ffbf3d;border-color:#c77a00}.btn[data-mode=basic].active{color:#d59aff;border-color:#8f4bc7}.layout{display:grid;grid-template-columns:31% 36% 33%;gap:5px;padding:4px;border-inline:1px solid #242a30;background:#0b0d10;min-height:0}.panel{background:linear-gradient(#171a1e,#111418);border:1px solid var(--line);border-radius:10px;box-shadow:inset 0 0 18px #0006}.left,.center,.right{padding:8px;overflow:hidden}.head{font-size:16px;font-weight:800;margin-bottom:3px}.sub{font-size:12px;color:var(--muted);line-height:1.35;margin-bottom:5px}.targets,.quick{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}.targets{margin-bottom:5px}.target{height:33px;border:1px solid #454c53;border-radius:7px;background:#15191d;color:#ddd;font-weight:800}.target.active{border-color:var(--a);color:var(--a);box-shadow:0 0 12px color-mix(in srgb,var(--a) 35%,transparent)}.card{border:1px solid #3a4046;border-left:5px solid var(--a);border-radius:9px;background:#ffffff05;padding:6px 8px;margin-bottom:4px}.card.auto{border-color:var(--a);box-shadow:0 0 14px color-mix(in srgb,var(--a) 35%,transparent)}.ct{font-size:14px;font-weight:800;color:var(--a)}.desc{font-size:11px;margin-top:1px}.state{float:right;font-size:10px;padding:2px 6px;border:1px solid var(--a);border-radius:10px}.row{display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center;margin-top:5px}.row input{height:37px;width:100%;border:1px solid #454c53;border-radius:7px;background:#090b0d;color:#fff;text-align:right;padding:0 10px;font-size:21px;font-weight:900}.auto input{border-color:var(--a);color:var(--a)}.auto input::placeholder{color:var(--a);opacity:1;text-align:center}.quick{grid-template-columns:repeat(4,1fr);margin-top:4px}.quick button{height:26px;border:1px solid #454c53;border-radius:6px;background:#1a1e22;color:#eee}.quick button:disabled{opacity:.35}.center{display:grid;place-items:center}.stack{width:min(100%,520px)}.board{display:grid;grid-template-rows:auto 55px auto;justify-items:center;padding:12px 20px 10px;border:1px solid #444b52;border-radius:16px;background:radial-gradient(circle at 50% 20%,#ffffff0a,transparent 50%),#0d1013}.fi{text-align:center;z-index:2}.sym{font-size:26px;font-weight:900}.lab{font-size:20px;font-weight:800}.val{margin-top:5px;min-width:118px;padding:5px 11px;border:1px solid #32363b;border-radius:8px;background:#050607;font-size:29px;font-weight:900}.fi.auto .val{border-color:var(--a);box-shadow:0 0 16px color-mix(in srgb,var(--a) 50%,transparent)}.am{height:14px;font-size:10px;font-weight:800}.divider{position:relative;width:88%;height:55px}.divider:before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:#d7dde2}.divider:after{content:"";position:absolute;left:50%;top:50%;width:2px;height:108px;background:#d7dde2}.op{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:27px;color:#ff4a40;background:#0d1013;padding:0 6px}.op.l{left:23%}.op.r{left:77%}.bottom{width:100%;display:grid;grid-template-columns:1fr 60px 1fr;align-items:end;justify-items:center;z-index:2}.mul{grid-column:2;font-size:31px;color:#ff4a40;margin-bottom:8px}.fl{grid-column:1}.fr{grid-column:3}.formula{margin-top:6px;padding:7px 10px;border:1px solid #444b52;border-radius:8px;text-align:center;font-weight:800}.flow{text-align:center;margin-top:5px;font-size:12px}.rightgrid{display:grid;gap:5px}.res{border:1px solid #3a4046;border-radius:9px;background:#121519;padding:7px}.answer{min-height:128px;display:grid;place-items:center;text-align:center;border-color:var(--a);box-shadow:0 0 16px color-mix(in srgb,var(--a) 25%,transparent)}.ak{font-size:14px;font-weight:900;color:var(--a)}.al{font-size:19px;font-weight:900;margin-top:5px}.av{font-size:39px;font-weight:900;color:var(--a);margin-top:5px}.ab{font-size:12px;margin-top:4px;color:#d5dbe1}.rt{font-size:14px;font-weight:800;color:#ffc247;margin-bottom:5px}.cap{display:grid;grid-template-columns:125px 1fr;gap:10px;align-items:center}.cap select{width:100%;height:34px;background:#15191d;color:#fff;border:1px solid #454c53;border-radius:7px}.sum{display:grid;grid-template-columns:1fr 1fr}.sb{padding:6px;border-left:1px solid #3a4046}.sb:first-child{border-left:0}.sv{font-size:26px;font-weight:900;color:var(--ok)}.bar{height:14px;border:1px solid #555;border-radius:9px;background:#090b0d;overflow:hidden;margin-top:5px}.bar span{display:block;height:100%;background:linear-gradient(90deg,#47c82e,#77e85e)}.scale{display:flex;justify-content:space-between;font-size:11px}.status{font-size:12px;font-weight:800;color:var(--ok);margin-top:4px}.note{font-size:12px;line-height:1.5}.teacher{display:grid;grid-template-columns:125px 1.15fr 1fr .72fr .72fr;gap:8px;align-items:stretch;margin:0 4px 4px;padding:6px 9px;height:148px;overflow:hidden}.teacher img{width:120px;height:138px;object-fit:cover;object-position:48% 14%;align-self:end}.intro{display:flex;flex-direction:column;min-width:0}.teacher h3{margin:0 0 4px;color:#ffd04d;font-size:18px}.speech{position:relative;flex:1;border-radius:11px;background:#f2e4b2;color:#151515;padding:8px 10px;font-size:11.5px;line-height:1.38;font-weight:700;overflow:hidden}.speech:before{content:"";position:absolute;left:-11px;top:23px;border-block:9px solid transparent;border-right:12px solid #f2e4b2}.tc{border-radius:10px;background:#f2f2f2;color:#161616;padding:8px 9px;font-size:11.5px;line-height:1.35;display:flex;flex-direction:column;justify-content:center;overflow:hidden}.tc small{display:block;color:#555;margin-bottom:4px;font-size:10px}.tc strong{font-size:13px}.tc .p{color:var(--p);font-weight:900}.tc .v{color:var(--v);font-weight:900}.tc .i{color:var(--i);font-weight:900}.tc .r{color:var(--r);font-weight:900}.foot{display:flex;align-items:center;justify-content:space-between;padding:3px 8px;border:1px solid #242a30;border-radius:0 0 12px 12px;background:#0d1013;font-size:11px}.home{color:#fff;text-decoration:none;border:1px solid #444b52;border-radius:7px;padding:4px 8px}.dlg{width:min(560px,calc(100% - 32px));border:1px solid #59616a;border-radius:12px;background:#111418;color:#f4f6f8;padding:0}.dlg::backdrop{background:#000a}.dh{display:flex;justify-content:space-between;padding:12px 15px;border-bottom:1px solid #343a41}.db{padding:14px 18px;line-height:1.7}@media(max-width:1100px){body{overflow:auto}.app{height:auto;grid-template-rows:auto auto auto auto}.layout{grid-template-columns:1fr}.left,.center,.right{overflow:visible}.teacher{height:auto;grid-template-columns:105px 1fr}.teacher img{width:100px;height:125px}.tc{grid-column:2}.speech:before{display:none}}
</style></head><body><main class="app"><header class="top"><div class="title"><span class="bolt">⚡</span><b>電気を見える化</b><span id="lessonTitle">｜V・W・Aの法則</span></div><div class="actions"><div class="modes"><button class="btn active" data-mode="field">現場モード（V・W・A）</button><button class="btn" data-mode="basic">基礎モード（V・I・R）</button></div><span class="sep"></span><div class="pages"><button class="btn" id="helpBtn">ⓘ 使い方</button><a class="link" href="SinglePhase3.html">次へ ▶</a></div></div></header><section class="layout"><section class="panel left"><div class="head">① 求めたい値を選ぶ</div><div class="sub">求めたい項目を1つ選び、残り2項目は数値入力または下のボタンで設定します。</div><div class="targets" id="targetRow"></div><div id="inputCards"></div></section><section class="panel center"><div class="stack"><div class="board"><div class="fi" id="formulaTop"></div><div class="divider"><span class="op l">÷</span><span class="op r">÷</span></div><div class="bottom"><div class="fi fl" id="formulaLeft"></div><div class="mul">×</div><div class="fi fr" id="formulaRight"></div></div></div><div class="formula" id="activeFormula"></div><div class="flow" id="flowNote"></div></div></section><section class="panel right"><div class="head" id="rightHead">③ AUTOの答えと現場へのつながり</div><div class="rightgrid" id="rightContent"></div></section></section><section class="panel teacher"><img src="assets/analog_teacher_pointing.webp" alt="先生"><div class="intro"><h3>先生のひとこと</h3><div class="speech" id="teacherIntro"></div></div><div class="tc" id="teacherCurrent"></div><div class="tc" id="teacherExample1"></div><div class="tc" id="teacherExample2"></div></section><footer class="foot"><a class="home" href="index.html">⌂ TOPへ</a><span>8bit Lighting Study</span></footer></main><dialog class="dlg" id="helpDialog"><div class="dh"><b>使い方</b><button id="helpClose">閉じる</button></div><div class="db"><ol><li>求めたい値を1つ選びます。</li><li>残り2項目を入力します。</li><li>中央で式を確認します。</li><li>右側でAUTOの答えを確認します。</li><li>下で理由と他の例を確認します。</li></ol></div></dialog><script>
const $=id=>document.getElementById(id),C={field:{title:'｜V・W・Aの法則',keys:['P','V','I'],target:'I',values:{P:500,V:100,I:5},items:{P:['電力 P','電力（W）','灯体の消費電力の合計','W','var(--p)',[100,300,500,1000]],V:['電圧 V','電圧（V）','使用する電源電圧','V','var(--v)',[50,100,200,230]],I:['電流 I','電流（A）','回路に流れる電流','A','var(--i)',[1,5,10,20]]}},basic:{title:'｜V・I・Rの法則',keys:['V','I','R'],target:'V',values:{V:20,I:2,R:10},items:{V:['電圧 V','電圧（V）','電気を押し出す力','V','var(--v)',[3,6,12,24]],I:['電流 I','電流（A）','回路に流れる電気の量','A','var(--i)',[.5,1,2,5]],R:['抵抗 R','抵抗（Ω）','電気の流れにくさ','Ω','var(--r)',[2,5,10,20]]}}};let mode='field',target=C.field.target;const f=(k,v)=>k==='I'?Number(v).toFixed(2):Number(v).toFixed(1).replace(/\.0$/,'');function calc(){let c=C[mode],[a,b,d]=c.keys;if(target===a)c.values[a]=c.values[b]*c.values[d];else if(target===b)c.values[b]=c.values[d]?c.values[a]/c.values[d]:0;else c.values[d]=c.values[b]?c.values[a]/c.values[b]:0}function item(k){let c=C[mode],x=c.items[k],a=k===target;return `<div class="sym" style="color:${x[4]}">${k}</div><div class="lab">${x[1]}</div><div class="val" style="--a:${x[4]};color:${x[4]}">${f(k,c.values[k])}</div><div class="am" style="color:${x[4]}">${a?'AUTO':''}</div>`}function inputs(){let c=C[mode];$('targetRow').innerHTML=c.keys.map(k=>`<button class="target ${k===target?'active':''}" style="--a:${c.items[k][4]}" data-k="${k}">${c.items[k][0]}</button>`).join('');$('inputCards').innerHTML=c.keys.map(k=>{let x=c.items[k],a=k===target;return `<div class="card ${a?'auto':''}" style="--a:${x[4]}"><div class="ct">${x[0]}<span class="state">${a?'AUTO':'入力'}</span></div><div class="desc">${x[2]}</div><div class="row"><input data-k="${k}" type="number" step=".01" ${a?'readonly placeholder="AUTO"':`value="${f(k,c.values[k])}"`}><b>${x[3]}</b></div><div class="quick">${x[5].map(v=>`<button data-k="${k}" data-v="${v}" ${a?'disabled':''}>${v}${x[3]}</button>`).join('')}</div></div>`}).join('');document.querySelectorAll('.target').forEach(b=>b.onclick=()=>{target=b.dataset.k;calc();render()});document.querySelectorAll('#inputCards input').forEach(i=>i.oninput=()=>{if(i.readOnly)return;c.values[i.dataset.k]=+i.value||0;calc();formula();right();teacher()});document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>{if(b.disabled)return;c.values[b.dataset.k]=+b.dataset.v;calc();render()})}function formula(){let c=C[mode],[a,b,d]=c.keys;$('formulaTop').innerHTML=item(a);$('formulaLeft').innerHTML=item(b);$('formulaRight').innerHTML=item(d);[['formulaTop',a],['formulaLeft',b],['formulaRight',d]].forEach(([id,k])=>{$(id).classList.toggle('auto',k===target);$(id).style.setProperty('--a',c.items[k][4])});let col=k=>c.items[k][4];$('activeFormula').innerHTML=target===a?`<span style="color:${col(a)}">${a}</span> = <span style="color:${col(b)}">${b}</span> × <span style="color:${col(d)}">${d}</span>`:target===b?`<span style="color:${col(b)}">${b}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(d)}">${d}</span>`:`<span style="color:${col(d)}">${d}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(b)}">${b}</span>`;$('flowNote').textContent=`${c.keys.filter(k=>k!==target).join(' と ')} を入力すると、${c.items[target][0]} が自動計算されます。`}function right(){let c=C[mode],x=c.items[target],v=c.values[target];if(mode==='field'){let I=c.values.I,old=$('breaker'),br=+(old?old.value:15),rem=br-I,rat=br?I/br:0;$('rightHead').textContent='③ AUTOの答えと現場へのつながり';$('rightContent').innerHTML=`<div class="res answer" style="--a:${x[4]}"><div><div class="ak">AUTOの答え</div><div class="al">${x[1]}</div><div class="av">${f(target,v)} ${x[3]}</div><div class="ab">${c.keys.filter(k=>k!==target).map(k=>`${k}=${f(k,c.values[k])}${c.items[k][3]}`).join('、')} のとき</div></div></div><div class="res"><div class="rt">ブレーカー容量と余裕</div><div class="cap"><div>ブレーカー容量<select id="breaker">${[10,15,20,30,60].map(n=>`<option ${n===br?'selected':''}>${n}</option>`).join('')}</select></div><div class="sum"><div class="sb">残り容量<div class="sv">${Math.max(0,rem).toFixed(2)} A</div></div><div class="sb">使用率<div class="sv">${(rat*100).toFixed(1)}%</div></div></div></div><div class="bar"><span style="width:${Math.min(100,rat*100)}%"></span></div><div class="scale"><span>0%</span><span>50%</span><span>100%</span></div><div class="status">${rat>1?'⚠ 容量超過':rat>.8?'△ 余裕が少ない':'✓ 余裕があります'}</div></div><div class="res note">✓ 電流がブレーカー容量を超えていないか確認する。<br>✓ 配線の許容電流も確認する。</div>`;$('breaker').onchange=right}else{$('rightHead').textContent='③ 基礎モードの答え';$('rightContent').innerHTML=`<div class="res answer" style="--a:${x[4]}"><div><div class="ak">AUTOの答え</div><div class="al">${x[1]}</div><div class="av">${f(target,v)} ${x[3]}</div><div class="ab">${c.keys.filter(k=>k!==target).map(k=>`${k}=${f(k,c.values[k])}${c.items[k][3]}`).join('、')} のとき</div></div></div><div class="res note">2つを入力すると残り1つが求まります。</div>`}}function ex(k){let c=C[mode].values;if(mode==='field'){if(k==='I')return `<small>電流 I をAUTOにした場合</small><strong>${f('P',c.P)}Wを${f('V',c.V)}Vで使うと、<br><span class="p">${f('P',c.P)}</span> ÷ <span class="v">${f('V',c.V)}</span> = <span class="i">${f('I',c.I)}A</span></strong><br>ブレーカーには<span class="i">${f('I',c.I)}A</span>流れます。`;if(k==='V')return `<small>電圧 V をAUTOにした場合</small><strong><span class="p">${f('P',c.P)}</span> ÷ <span class="i">${f('I',c.I)}</span> = <span class="v">${f('V',c.V)}V</span></strong><br><span class="v">${f('V',c.V)}V</span>の電源が必要です。`;return `<small>電力 P をAUTOにした場合</small><strong><span class="v">${f('V',c.V)}</span> × <span class="i">${f('I',c.I)}</span> = <span class="p">${f('P',c.P)}W</span></strong><br>この回路では<span class="p">${f('P',c.P)}W</span>使います。`}if(k==='V')return `<small>電圧 V</small><strong><span class="i">${f('I',c.I)}A</span> × <span class="r">${f('R',c.R)}Ω</span> = <span class="v">${f('V',c.V)}V</span></strong>`;if(k==='I')return `<small>電流 I</small><strong><span class="v">${f('V',c.V)}V</span> ÷ <span class="r">${f('R',c.R)}Ω</span> = <span class="i">${f('I',c.I)}A</span></strong>`;return `<small>抵抗 R</small><strong><span class="v">${f('V',c.V)}V</span> ÷ <span class="i">${f('I',c.I)}A</span> = <span class="r">${f('R',c.R)}Ω</span></strong>`}function teacher(){if(mode==='field')$('teacherIntro').innerHTML='【初期表示】<br>「この回路、あと何台つなげる？」<br>「この灯体は何A流れる？」<br><br>接続前にブレーカー容量やケーブル容量を確認します。';else $('teacherIntro').innerHTML='電圧・電流・抵抗の基本関係です。<br><br>求めたい値を選び、残り2つを入力しましょう。';$('teacherCurrent').innerHTML=ex(target);let o=C[mode].keys.filter(k=>k!==target);$('teacherExample1').innerHTML=ex(o[0]);$('teacherExample2').innerHTML=ex(o[1])}function render(){let c=C[mode];$('lessonTitle').textContent=c.title;document.querySelectorAll('[data-mode]').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));inputs();formula();right();teacher()}document.querySelectorAll('[data-mode]').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;target=C[mode].target;calc();render()});$('helpBtn').onclick=()=>$('helpDialog').showModal();$('helpClose').onclick=()=>$('helpDialog').close();$('helpDialog').onclick=e=>{if(e.target===$('helpDialog'))$('helpDialog').close()};calc();render();
</script></body></html>
