<style>

*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--text)}body{font-family:"Hiragino Sans","Yu Gothic",Meiryo,system-ui,-apple-system,sans-serif;padding:6px;overflow:hidden}button,input,select{font:inherit}.app{width:min(1500px,100%);height:100%;margin:auto;display:grid;grid-template-rows:auto minmax(0,1fr) auto auto}.topbar{min-height:46px;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:6px 12px;border:1px solid #242a30;border-radius:12px 12px 0 0;background:linear-gradient(#111418,#0b0d10)}.title{display:flex;align-items:center;gap:10px;min-width:0}.bolt{font-size:25px;color:#ffd000}.title h1{margin:0;font-size:24px;white-space:nowrap}.title span{font-size:14px;color:#d0d5da;white-space:nowrap}.top-actions{display:flex;align-items:center;gap:10px}.modes,.page-actions{display:flex;gap:7px}.group-divider{width:1px;height:26px;background:#3c434a}.mode,.action-link,.help{height:33px;padding:0 11px;border-radius:8px;border:1px solid #424950;color:#ddd;background:#171a1e;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}.mode.active{color:#ffbf3d;border-color:#c77a00}.mode[data-mode="basic"].active{color:#d59aff;border-color:#8f4bc7}.action-link{border-color:#59616a;color:#fff}.layout{display:grid;grid-template-columns:31% 36% 33%;gap:6px;padding:6px;border-left:1px solid #242a30;border-right:1px solid #242a30;background:#0b0d10;min-height:0}.panel{background:linear-gradient(#171a1e,#111418);border:1px solid var(--line);border-radius:10px;box-shadow:inset 0 0 18px #0006}.left,.center,.right{padding:10px;overflow:hidden}.section-head{font-size:17px;font-weight:800;margin-bottom:4px}.section-sub{font-size:13px;color:var(--muted);margin-bottom:8px;line-height:1.45}.target-row{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}.target-btn{height:36px;border:1px solid #454c53;border-radius:7px;background:#15191d;color:#ddd;font-weight:800;cursor:pointer}.target-btn.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px color-mix(in srgb,var(--accent) 35%,transparent)}.input-card{--accent:#fff;border:1px solid #3a4046;border-left:5px solid var(--accent);border-radius:9px;background:#ffffff05;padding:8px 9px;margin-bottom:6px}.input-card.auto{box-shadow:0 0 16px color-mix(in srgb,var(--accent) 35%,transparent);border-color:var(--accent)}.input-title{font-size:15px;font-weight:800;color:var(--accent)}.input-desc{font-size:12px;margin-top:2px}.state{float:right;font-size:11px;padding:2px 7px;border-radius:10px;border:1px solid var(--accent);color:var(--accent)}.input-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-top:7px}.input-row input{height:41px;width:100%;border-radius:7px;border:1px solid #454c53;background:#090b0d;color:#fff;text-align:right;padding:0 12px;font-size:23px;font-weight:900}.input-card.auto input{color:var(--accent);border-color:var(--accent)}.input-card.auto input::placeholder{color:var(--accent);opacity:1;text-align:center}.unit{font-size:16px;font-weight:800}.quick{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-top:6px}.quick button{height:29px;border:1px solid #454c53;border-radius:6px;background:#1a1e22;color:#eee;cursor:pointer}.quick button:disabled{opacity:.35}.center{display:grid;place-items:center}.formula-stack{width:min(100%,520px)}.formula-board{display:grid;grid-template-rows:auto 70px auto;justify-items:center;padding:20px 24px 18px;border:1px solid #444b52;border-radius:16px;background:radial-gradient(circle at 50% 20%,#ffffff0a,transparent 50%),#0d1013}.formula-item{text-align:center;position:relative;z-index:2}.formula-symbol{font-size:29px;line-height:1;font-weight:900}.formula-label{font-size:23px;font-weight:800;margin-top:4px}.formula-value{margin-top:7px;min-width:124px;padding:7px 13px;border-radius:8px;background:#050607;border:1px solid #32363b;font-size:32px;font-weight:900}.formula-item.auto .formula-value{border-color:var(--accent);box-shadow:0 0 18px color-mix(in srgb,var(--accent) 50%,transparent)}.auto-mark{height:16px;margin-top:5px;font-size:11px;font-weight:800}.formula-divider{position:relative;width:88%;height:70px}.formula-divider:before{content:"";position:absolute;left:0;right:0;top:50%;height:2px;background:#d7dde2}.formula-divider:after{content:"";position:absolute;left:50%;top:50%;width:2px;height:128px;background:#d7dde2}.operator{position:absolute;top:50%;transform:translate(-50%,-50%);font-size:30px;font-weight:400;color:#ff4a40;background:#0d1013;padding:0 7px}.divide-left{left:23%}.divide-right{left:77%}.formula-bottom{width:100%;display:grid;grid-template-columns:1fr 66px 1fr;align-items:end;justify-items:center;position:relative;z-index:2}.bottom-left{grid-column:1}.bottom-right{grid-column:3}.multiply{grid-column:2;font-size:34px;font-weight:400;color:#ff4a40;background:#0d1013;padding:4px 8px;margin-bottom:12px}.formula-caption{margin-top:9px;border:1px solid #444b52;border-radius:8px;padding:9px 12px;background:#0e1013;text-align:center;font-size:15px;font-weight:800}.flow-note{text-align:center;margin-top:8px;font-size:13px;color:#dfe4e8}.right-grid{display:grid;gap:7px}.result-card{border:1px solid #3a4046;border-radius:9px;background:#121519;padding:9px}.answer-card{min-height:164px;display:grid;place-items:center;text-align:center;border-color:var(--accent);box-shadow:0 0 18px color-mix(in srgb,var(--accent) 25%,transparent)}.answer-kicker{font-size:15px;font-weight:900;color:var(--accent)}.answer-label{font-size:21px;font-weight:900;margin-top:8px}.answer-value{font-size:44px;font-weight:900;color:var(--accent);margin-top:8px}.answer-basis{font-size:13px;color:#d5dbe1;margin-top:7px}.result-title{font-size:15px;font-weight:800;color:#ffc247;margin-bottom:6px}.capacity-grid{display:grid;grid-template-columns:130px 1fr;gap:12px;align-items:center}.capacity-grid select{width:100%;height:38px;margin-top:5px;background:#15191d;color:#fff;border:1px solid #454c53;border-radius:7px;padding:0 8px}.summary{display:grid;grid-template-columns:1fr 1fr;gap:8px}.summary-box{padding:8px;border-left:1px solid #3a4046}.summary-box:first-child{border-left:0}.summary-label{font-size:13px}.summary-value{font-size:29px;font-weight:900;color:var(--ok);margin-top:4px}.bar{height:15px;border-radius:9px;border:1px solid #555;background:#090b0d;overflow:hidden;margin-top:7px}.bar span{display:block;height:100%;background:linear-gradient(90deg,#47c82e,#77e85e)}.scale{display:flex;justify-content:space-between;font-size:12px;margin-top:4px}.status{font-size:13px;font-weight:800;color:var(--ok);margin-top:7px}.check,.basic-note{font-size:13px;line-height:1.65}.teacher{display:grid;grid-template-columns:95px 1fr;gap:14px;align-items:center;margin:0 6px 6px;padding:8px 14px;min-height:112px}.teacher-character{width:95px;height:100px;object-fit:cover;object-position:48% 14%;align-self:end}.teacher h3{margin:0 0 6px;color:#ffd04d;font-size:18px}.teacher p{margin:0;font-size:15px;line-height:1.55}.teacher .p{color:var(--p);font-weight:900}.teacher .v{color:var(--v);font-weight:900}.teacher .i{color:var(--i);font-weight:900}.teacher .r{color:var(--r);font-weight:900}.teacher .ok{color:var(--ok);font-weight:900}.bottomnav{min-height:38px;display:flex;align-items:center;justify-content:space-between;padding:5px 10px;border:1px solid #242a30;border-radius:0 0 12px 12px;background:#0d1013;font-size:12px}.home{color:#fff;text-decoration:none;border:1px solid #444b52;border-radius:7px;padding:6px 10px}.brand{color:#aaa}.help-dialog{width:min(560px,calc(100% - 32px));border:1px solid #59616a;border-radius:12px;background:#111418;color:#f4f6f8;padding:0;box-shadow:0 20px 70px #000c}.help-dialog::backdrop{background:#000a}.help-head{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;border-bottom:1px solid #343a41}.help-head h2{margin:0;font-size:19px}.help-close{border:1px solid #555d65;border-radius:7px;background:#1a1e22;color:#fff;padding:5px 10px;cursor:pointer}.help-body{padding:14px 18px 17px;font-size:14px;line-height:1.7}.help-body ol{margin:0;padding-left:22px}@media(max-width:1100px){body{overflow:auto}.app{height:auto}.topbar{align-items:flex-start}.top-actions{flex-wrap:wrap;justify-content:flex-end}.layout{grid-template-columns:1fr}.left,.center,.right{overflow:visible}}
</style>

<body>
<main class="app">
<header class="topbar"><div class="title"><div class="bolt">⚡</div><h1>電気を見える化</h1><span id="lessonTitle">｜V・W・Aの法則</span></div><div class="top-actions"><div class="modes"><button type="button" class="mode active" data-mode="field">現場モード（V・W・A）</button><button type="button" class="mode" data-mode="basic">基礎モード（V・I・R）</button></div><div class="group-divider"></div><div class="page-actions"><button type="button" class="help" id="helpBtn">ⓘ 使い方</button><a class="action-link" href="SinglePhase3.html">次へ ▶</a></div></div></header>
<section class="layout"><section class="panel left"><div class="section-head">① 求めたい値を選ぶ</div><div class="section-sub">求めたい項目を1つ選び、残り2項目は数値入力または下のボタンで設定します。</div><div class="target-row" id="targetRow"></div><div id="inputCards"></div></section><section class="panel center"><div class="formula-stack"><div class="formula-board"><div class="formula-item" id="formulaTop"></div><div class="formula-divider"><div class="operator divide-left">÷</div><div class="operator divide-right">÷</div></div><div class="formula-bottom"><div class="formula-item bottom-left" id="formulaLeft"></div><div class="multiply">×</div><div class="formula-item bottom-right" id="formulaRight"></div></div></div><div class="formula-caption" id="activeFormula"></div><div class="flow-note" id="flowNote"></div></div></section><section class="panel right"><div class="section-head" id="rightHead">③ AUTOの答えと現場へのつながり</div><div class="right-grid" id="rightContent"></div></section></section>
<section class="panel teacher"><img class="teacher-character" src="assets/analog_teacher_pointing.webp" alt="照明教材の先生"><div><h3>先生のひとこと</h3><p id="teacherText"></p></div></section><footer class="bottomnav"><a class="home" href="index.html">⌂ TOPへ</a><div class="brand">8bit Lighting Study</div></footer></main>
<dialog class="help-dialog" id="helpDialog"><div class="help-head"><h2>使い方</h2><button class="help-close" id="helpClose" type="button">閉じる</button></div><div class="help-body"><ol><li>求めたい値を1つ選びます。選んだ項目はAUTOになります。</li><li>残り2項目を、数値入力またはボタンで設定します。</li><li>中央のT字図で式を確認します。</li><li>右側の「AUTOの答え」で結果を確認します。</li><li>現場モードでは、ブレーカー容量と余裕も確認します。</li></ol></div></dialog>
<script>
(()=>{const $=id=>document.getElementById(id);const configs={field:{title:'｜V・W・Aの法則',keys:['P','V','I'],target:'I',values:{P:500,V:100,I:5},items:{P:{name:'電力 P',label:'電力（W）',desc:'灯体の消費電力の合計',unit:'W',color:'var(--p)',presets:[100,300,500,1000]},V:{name:'電圧 V',label:'電圧（V）',desc:'使用する電源電圧',unit:'V',color:'var(--v)',presets:[50,100,200,230]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電流',unit:'A',color:'var(--i)',presets:[1,5,10,20]}}},basic:{title:'｜V・I・Rの法則',keys:['V','I','R'],target:'V',values:{V:20,I:2,R:10},items:{V:{name:'電圧 V',label:'電圧（V）',desc:'電気を押し出す力',unit:'V',color:'var(--v)',presets:[3,6,12,24]},I:{name:'電流 I',label:'電流（A）',desc:'回路に流れる電気の量',unit:'A',color:'var(--i)',presets:[0.5,1,2,5]},R:{name:'抵抗 R',label:'抵抗（Ω）',desc:'電気の流れにくさ',unit:'Ω',color:'var(--r)',presets:[2,5,10,20]}}}};let mode='field',target=configs.field.target,hasInteracted=false;const fmt=(k,v)=>k==='I'?Number(v).toFixed(2):Number(v).toFixed(1).replace(/\.0$/,'');function calc(){const c=configs[mode],[a,b,d]=c.keys;if(target===a)c.values[a]=c.values[b]*c.values[d];else if(target===b)c.values[b]=c.values[d]?c.values[a]/c.values[d]:0;else c.values[d]=c.values[b]?c.values[a]/c.values[b]:0}function formulaItem(k){const c=configs[mode],i=c.items[k],auto=k===target;return `<div class="formula-symbol" style="color:${i.color}">${k}</div><div class="formula-label">${i.label}</div><div class="formula-value" style="--accent:${i.color};color:${i.color}">${fmt(k,c.values[k])}</div><div class="auto-mark" style="color:${i.color}">${auto?'AUTO':''}</div>`}function renderInputs(){const c=configs[mode];$('targetRow').innerHTML=c.keys.map(k=>`<button class="target-btn ${k===target?'active':''}" data-key="${k}" style="--accent:${c.items[k].color}">${c.items[k].name}</button>`).join('');$('inputCards').innerHTML=c.keys.map(k=>{const i=c.items[k],auto=k===target;return `<div class="input-card ${auto?'auto':''}" style="--accent:${i.color}"><div class="input-title">${i.name}<span class="state">${auto?'AUTO':'入力'}</span></div><div class="input-desc">${i.desc}</div><div class="input-row"><input data-key="${k}" type="number" step="0.01" inputmode="decimal" ${auto?'readonly value="" placeholder="AUTO"':`value="${fmt(k,c.values[k])}"`}><span class="unit">${i.unit}</span></div><div class="quick">${i.presets.map(x=>`<button data-key="${k}" data-value="${x}" ${auto?'disabled':''}>${x}${i.unit}</button>`).join('')}</div></div>`}).join('');document.querySelectorAll('.target-btn').forEach(b=>b.onclick=()=>{hasInteracted=true;target=b.dataset.key;calc();render()});document.querySelectorAll('#inputCards input').forEach(inp=>inp.oninput=()=>{if(inp.readOnly)return;hasInteracted=true;configs[mode].values[inp.dataset.key]=Number(inp.value)||0;calc();renderFormula();renderRight();renderTeacher()});document.querySelectorAll('.quick button').forEach(b=>b.onclick=()=>{if(b.disabled)return;hasInteracted=true;configs[mode].values[b.dataset.key]=Number(b.dataset.value);calc();render()})}function renderFormula(){const c=configs[mode],[a,b,d]=c.keys;$('formulaTop').innerHTML=formulaItem(a);$('formulaLeft').innerHTML=formulaItem(b);$('formulaRight').innerHTML=formulaItem(d);$('formulaTop').classList.toggle('auto',target===a);$('formulaLeft').classList.toggle('auto',target===b);$('formulaRight').classList.toggle('auto',target===d);const col=k=>c.items[k].color;$('activeFormula').innerHTML=target===a?`<span style="color:${col(a)}">${a}</span> = <span style="color:${col(b)}">${b}</span> × <span style="color:${col(d)}">${d}</span>`:target===b?`<span style="color:${col(b)}">${b}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(d)}">${d}</span>`:`<span style="color:${col(d)}">${d}</span> = <span style="color:${col(a)}">${a}</span> ÷ <span style="color:${col(b)}">${b}</span>`;$('flowNote').textContent=`${c.keys.filter(k=>k!==target).join(' と ')} を入力すると、${c.items[target].name} が自動計算されます。`}function answerBasis(){const c=configs[mode],others=c.keys.filter(k=>k!==target);return `${others.map(k=>`${k}=${fmt(k,c.values[k])}${c.items[k].unit}`).join('、')} のとき`}function renderRight(){const c=configs[mode],i=c.items[target],val=c.values[target];let html=`<div class="result-card answer-card" style="--accent:${i.color}"><div><div class="answer-kicker">AUTOの答え</div><div class="answer-label">${i.name}</div><div class="answer-value">${fmt(target,val)} ${i.unit}</div><div class="answer-basis">${answerBasis()}</div></div></div>`;if(mode==='field'){const old=$('breaker'),breaker=Number(old?old.value:15),amps=c.values.I,remain=breaker-amps,ratio=breaker?amps/breaker:0;html+=`<div class="result-card"><div class="result-title">ブレーカー容量と余裕</div><div class="capacity-grid"><div><label>ブレーカー容量</label><select id="breaker"><option ${breaker===10?'selected':''}>10</option><option ${breaker===15?'selected':''}>15</option><option ${breaker===20?'selected':''}>20</option><option ${breaker===30?'selected':''}>30</option><option ${breaker===60?'selected':''}>60</option></select></div><div class="summary"><div class="summary-box"><div class="summary-label">残り容量</div><div class="summary-value">${Math.max(0,remain).toFixed(2)} A</div></div><div class="summary-box"><div class="summary-label">使用率</div><div class="summary-value">${(ratio*100).toFixed(1)}%</div></div></div></div><div class="bar"><span style="width:${Math.min(100,ratio*100)}%"></span></div><div class="scale"><span>0%</span><span>50%</span><span>100%</span></div><div class="status">${ratio>1?'⚠ 容量を超えています':ratio>.8?'△ 余裕が少ないです':'✓ 余裕があります'}</div></div><div class="result-card check">✓ 電流がブレーカー容量を超えていないか確認する。<br>✓ 配線の許容電流も確認する。</div>`}else html+=`<div class="result-card basic-note">電圧・電流・抵抗のうち、2つを入力すると残り1つが求まります。<br>詳しい意味や仕組みは、別の説明ページで扱います。</div>`;$('rightContent').innerHTML=html;const s=$('breaker');if(s)s.onchange=()=>{hasInteracted=true;renderRight();renderTeacher()}}function renderTeacher(){if(!hasInteracted&&mode==='field'){$('teacherText').innerHTML='仕込み中、<strong>「この回路、あと何台つなげる？」</strong>、<strong>「この灯体は何A流れる？」</strong><br>そんな時に使うのがV・W・Aの計算です。現場では灯体をつなぐ前に、ブレーカー容量やケーブル容量を確認します。まずは求めたい値を1つ選んでみましょう。';return}const c=configs[mode];if(mode==='field'){const P=fmt('P',c.values.P),V=fmt('V',c.values.V),I=fmt('I',c.values.I);$('teacherText').innerHTML=target==='I'?`<span class="p">${P}W</span>の灯体を<span class="v">${V}V</span>で使うと、${P} ÷ ${V} = <span class="i">${I}A</span>。つまり、この灯体を点灯するとブレーカーには${I}A流れます。`:target==='V'?`<span class="p">${P}W</span>を<span class="i">${I}A</span>で使うには、${P} ÷ ${I} = <span class="v">${V}V</span>。この電圧の電源が必要です。`:`<span class="v">${V}V</span>で<span class="i">${I}A</span>流れると、${V} × ${I} = <span class="p">${P}W</span>。この回路では${P}Wの電力を使っています。`}else{const V=fmt('V',c.values.V),I=fmt('I',c.values.I),R=fmt('R',c.values.R);$('teacherText').innerHTML=target==='V'?`<span class="i">${I}A</span>と<span class="r">${R}Ω</span>から、${I} × ${R} = <span class="v">${V}V</span>です。`:target==='I'?`<span class="v">${V}V</span>と<span class="r">${R}Ω</span>から、${V} ÷ ${R} = <span class="i">${I}A</span>です。`:`<span class="v">${V}V</span>と<span class="i">${I}A</span>から、${V} ÷ ${I} = <span class="r">${R}Ω</span>です。`}}function render(){const c=configs[mode];$('lessonTitle').textContent=c.title;document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('active',b.dataset.mode===mode));renderInputs();renderFormula();renderRight();renderTeacher()}document.querySelectorAll('.mode').forEach(b=>b.onclick=()=>{mode=b.dataset.mode;target=configs[mode].target;hasInteracted=mode!=='field';calc();render()});$('helpBtn').onclick=()=>$('helpDialog').showModal();$('helpClose').onclick=()=>$('helpDialog').close();$('helpDialog').onclick=e=>{if(e.target===$('helpDialog'))$('helpDialog').close()};calc();render()})();
</script>
</body>
</html>
