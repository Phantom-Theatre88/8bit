<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Integrated Lighting & Network Console Master Top</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --border-hand: #444444;
            --text-light: #e0e0e0;
            --accent: #ff6f00;
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Roboto', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .main-tab-container {
            display: flex;
            gap: 6px;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto 10px auto;
            flex-shrink: 0;
        }

        .main-tab-btn {
            font-family: inherit;
            font-weight: 600;
            font-size: 12px;
            padding: 10px 10px;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            -webkit-tap-highlight-color: transparent;
            flex: 1;
            text-align: center;
            white-space: nowrap;
        }

        .tab-dimmer {
            background: #1e1a17;
            border: 2px solid #3a322d;
            color: #665b55;
        }

        .tab-dimmer.active {
            background: var(--panel-bg);
            color: #ffffff;
            border-color: #ff6f00;
            border-bottom-color: var(--panel-bg);
            box-shadow: 0 -4px 12px rgba(255,111,0,0.4), 0 -2px 4px rgba(255,111,0,0.4), inset 0 1px 3px rgba(255,111,0,0.3);
            text-shadow: 0 0 6px rgba(255,111,0,0.8);
        }

        .tab-network {
            background: #141b1d;
            border: 2px solid #233134;
            color: #4e5f62;
        }

        .tab-network.active {
            background: var(--panel-bg);
            color: #ffffff;
            border-color: #00e676;
            border-bottom-color: var(--panel-bg);
            box-shadow: 0 -4px 12px rgba(0,230,118,0.4), 0 -2px 4px rgba(0,230,118,0.4), inset 0 1px 3px rgba(0,230,118,0.3);
            text-shadow: 0 0 6px rgba(0,230,118,0.8);
        }

        .tab-explain {
            background: #1a1a1a;
            border: 2px solid #333333;
            color: #555555;
        }

        .tab-explain.active {
            background: var(--panel-bg);
            color: #ffffff;
            border-color: #00e5ff;
            border-bottom-color: var(--panel-bg);
            box-shadow: 0 -4px 12px rgba(0,229,255,0.3), 0 -2px 4px rgba(0,229,255,0.3);
            text-shadow: 0 0 6px rgba(0,229,255,0.7);
        }

        .tab-separator {
            width: 2px;
            background: var(--border-hand);
            margin-top: 5px;
            height: 22px;
            flex-shrink: 0;
            opacity: 0.5;
        }

        .master-console-container {
            background-color: var(--panel-bg);
            border: 3px solid var(--border-hand);
            border-radius: 0px 20px 18px 10px/10px 18px 8px 20px;
            padding: 20px;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            flex-grow: 1;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .console-main-screen {
            width: 100%;
            aspect-ratio: 1200 / 530; 
            position: relative;
            flex-shrink: 0; 
        }

        .console-help-display {
            width: 100%;
            flex-grow: 1; 
            background: #060606;
            border: 2px solid #333333;
            border-radius: 8px;
            padding: 12px 18px;
            overflow-y: auto; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .help-text-content {
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.65;
            text-align: justify;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        .stage-view-panel {
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
        }

        .stage-view-panel.fade-type.active {
            display: block;
            animation: consoleFadeIn 0.25s ease-out forwards;
        }

        @keyframes consoleFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }



        /* --- MovingHead integrated layout fix v0.18.4 --- */
        .master-console-container.movinghead-active {
            gap: 10px;
        }
        .master-console-container.movinghead-active .console-main-screen {
            aspect-ratio: 1200 / 650;
            flex-shrink: 0;
        }
        .master-console-container.movinghead-active .console-help-display {
            flex: 0 0 96px;
            min-height: 78px;
            padding: 10px 18px;
        }
        .master-console-container.movinghead-active .help-text-content {
            font-size: 12.5px;
            line-height: 1.5;
        }

        /* --- Sim16Bit UI/UX integration v0.1: Module_Sim16Bit.js logic untouched --- */
        .master-console-container.sim16bit-active {
            gap: 10px;
        }
        .master-console-container.sim16bit-active .console-main-screen {
            aspect-ratio: 1200 / 650;
            flex-shrink: 0;
        }
        .master-console-container.sim16bit-active .console-help-display {
            flex: 0 0 108px;
            min-height: 86px;
            padding: 11px 18px;
        }
        .master-console-container.sim16bit-active .help-text-content {
            font-size: 12.5px;
            line-height: 1.55;
        }

        #panel-sim16bit.active {
            height: 100%;
        }
        .sim16-integrated-root {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 9px;
            background: #121212;
            border: 3px solid #444;
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,.75);
            overflow: hidden;
        }
        .sim16-integrated-header {
            display: grid;
            grid-template-columns: 1.08fr 2fr;
            gap: 10px;
            align-items: stretch;
            min-height: 68px;
        }
        .sim16-title-card,
        .sim16-concept-card {
            background: #070707;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 9px 13px;
            box-shadow: inset 0 0 16px rgba(0,0,0,.7);
            min-width: 0;
        }
        .sim16-title-main {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: .3px;
            color: #fff;
            line-height: 1.1;
        }
        .sim16-title-sub {
            font-size: 12.5px;
            color: #aaa;
            margin-top: 5px;
            line-height: 1.35;
        }
        .sim16-concept-card {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
        }
        .sim16-concept-pill {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 8px 10px;
            min-width: 0;
        }
        .sim16-concept-pill b {
            display: block;
            font-size: 14px;
            color: #fff;
            margin-bottom: 3px;
        }
        .sim16-concept-pill span {
            display: block;
            font-size: 12.5px;
            color: #bdbdbd;
            line-height: 1.35;
        }
        .sim16-concept-pill.master { border-left: 5px solid #ff6f00; }
        .sim16-concept-pill.coarse { border-left: 5px solid #00e5ff; }
        .sim16-concept-pill.fine { border-left: 5px solid #00e676; }
        .sim16-integrated-area {
            min-height: 0;
            background: #161616;
            border: 2px solid #3a3a3a;
            border-radius: 14px;
            padding: 11px;
            overflow: hidden;
        }
        #sim16bit-root {
            width: 100%;
            height: 100%;
        }
        #panel-sim16bit #sim16bit-root > div { gap: 16px !important; }
        #panel-sim16bit #sim16bit-root .col { min-width: 0 !important; }
        #panel-sim16bit #sim16bit-root .fader-col {
            width: 34% !important;
            padding: 12px 8px !important;
            background: #0b0b0b !important;
            border: 2px solid #343434 !important;
            border-radius: 12px !important;
            overflow: hidden !important;
        }
        #panel-sim16bit #sim16bit-root .center-col { width: 36% !important; gap: 10px !important; }
        #panel-sim16bit #sim16bit-root .bulb-col { width: 30% !important; }
        #panel-sim16bit #sim16bit-root .section-title {
            font-size: 13px !important;
            letter-spacing: 1.1px !important;
            color: #d0d0d0 !important;
            margin-bottom: 4px !important;
        }
        #panel-sim16bit #sim16bit-root .fader-bank { gap: 8px !important; }
        #panel-sim16bit #sim16bit-root .fader-cell-wrap { min-width: 72px !important; gap: 6px !important; }
        #panel-sim16bit #sim16bit-root .fader-area { height: 330px !important; width: 58px !important; }
        #panel-sim16bit #sim16bit-root .fader-scale {
            left: -1px !important;
            height: 286px !important;
            top: 22px !important;
            font-size: 12px !important;
            color: #6d6d6d !important;
        }
        #panel-sim16bit #sim16bit-root .fader-track-container {
            width: 40px !important;
            height: 286px !important;
            top: 22px !important;
            right: 1px !important;
        }
        #panel-sim16bit #sim16bit-root .fader-track {
            left: 18px !important;
            width: 5px !important;
            border-color: #3a3a3a !important;
        }
        #panel-sim16bit #sim16bit-root .fader-knob {
            width: 40px !important;
            height: 52px !important;
            border-width: 3px !important;
            box-shadow: 0 6px 12px rgba(0,0,0,.75), inset 0 1px 2px rgba(255,255,255,.55) !important;
        }
        #panel-sim16bit #sim16bit-root .step-btn {
            width: 44px !important;
            height: 34px !important;
            font-size: 13px !important;
            border-radius: 8px !important;
            touch-action: manipulation !important;
        }
        #panel-sim16bit #sim16bit-root .fader-label {
            font-size: 12px !important;
            color: #8b8b8b !important;
            letter-spacing: .2px !important;
        }
        #panel-sim16bit #sim16bit-root #sim16bit-label-master { color: #ff8a50 !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-label-coarse { color: #5eefff !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-label-fine { color: #52f5a1 !important; }
        #panel-sim16bit #sim16bit-root .digital-row { gap: 8px !important; }
        #panel-sim16bit #sim16bit-root .led-panel {
            padding: 8px 6px !important;
            border-width: 2px !important;
            border-radius: 9px !important;
            background: #040404 !important;
            min-height: 62px !important;
        }
        #panel-sim16bit #sim16bit-root .led-label {
            font-size: 11px !important;
            color: #848484 !important;
            letter-spacing: .35px !important;
        }
        #panel-sim16bit #sim16bit-root .led-num {
            font-size: 22px !important;
            line-height: 26px !important;
        }
        #panel-sim16bit #sim16bit-root #sim16bit-num-dmx { font-size: 18px !important; }
        #panel-sim16bit #sim16bit-root .panel-box {
            padding: 10px !important;
            border-radius: 10px !important;
            background: #090909 !important;
            border-color: #3e3e3e !important;
        }
        #panel-sim16bit #sim16bit-root #sim16bit-upper-graph-box { min-height: 145px !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-upper-graph-box span { font-size: 12.5px !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-txt-coarse-val,
        #panel-sim16bit #sim16bit-root #sim16bit-txt-fine-val {
            font-size: 16px !important;
            font-family: 'Roboto Mono', monospace !important;
        }
        #panel-sim16bit #sim16bit-root .matrix-cell {
            min-width: 20px !important;
            height: 32px !important;
            line-height: 28px !important;
            font-size: 13px !important;
            border-radius: 5px !important;
        }
        #panel-sim16bit #sim16bit-root .dark-room {
            border-radius: 12px !important;
            border-color: #3e3e3e !important;
            overflow: hidden !important;
        }
        #panel-sim16bit #sim16bit-root .bulb-image-container {
            width: 210px !important;
            height: 340px !important;
        }
        .sim16-integrated-footer {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 10px;
            min-height: 86px;
        }
        .sim16-help-block {
            background: #060606;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 10px 14px;
            overflow: hidden;
            color: #c8c8c8;
            line-height: 1.5;
            font-size: 13px;
        }
        .sim16-help-block strong { color: #fff; font-size: 14px; }
        .sim16-help-block b { color: #fff; }
        .sim16-formula {
            font-family: 'Roboto Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin: 4px 0 3px;
            letter-spacing: .2px;
        }
        .sim16-formula .coarse { color: #00e5ff; }
        .sim16-formula .fine { color: #00e676; }
        .sim16-formula .total { color: #b388ff; }
        @media (max-width: 1050px) {
            .sim16-integrated-root { padding: 10px; gap: 8px; }
            .sim16-integrated-header { grid-template-columns: 1fr; min-height: 0; }
            .sim16-concept-card { grid-template-columns: repeat(3, 1fr); }
            .sim16-title-main { font-size: 20px; }
            .sim16-title-sub { font-size: 12px; }
            #panel-sim16bit #sim16bit-root > div { gap: 10px !important; }
            #panel-sim16bit #sim16bit-root .fader-col { width: 36% !important; }
            #panel-sim16bit #sim16bit-root .center-col { width: 34% !important; }
            #panel-sim16bit #sim16bit-root .bulb-col { width: 30% !important; }
            #panel-sim16bit #sim16bit-root .fader-area { height: 300px !important; }
            #panel-sim16bit #sim16bit-root .fader-track-container { height: 260px !important; }
            #panel-sim16bit #sim16bit-root .fader-scale { height: 260px !important; }
            .sim16-integrated-footer { grid-template-columns: 1fr; min-height: 76px; }
            .sim16-help-block { font-size: 12px; line-height: 1.42; }
        }

        /* --- Network UI v0.2.1: outer frame polish only / canvas logic untouched --- */
        .master-console-container.network-active {
            gap: 10px;
            border-color: #1f5f66;
            box-shadow:
                0 10px 40px rgba(0,0,0,0.85),
                0 0 24px rgba(0,229,255,0.10);
            background:
                radial-gradient(circle at 50% 0%, rgba(0,229,255,0.08), transparent 34%),
                linear-gradient(180deg, #151919 0%, #111 100%);
        }

        .master-console-container.network-active .console-main-screen {
            aspect-ratio: 1200 / 600;
            flex-shrink: 0;
            background:
                linear-gradient(90deg, rgba(0,229,255,0.035) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0,229,255,0.025) 1px, transparent 1px),
                #070909;
            background-size: 36px 36px;
            border-radius: 12px;
            box-shadow:
                inset 0 0 28px rgba(0,0,0,0.85),
                inset 0 0 18px rgba(0,229,255,0.08);
        }

        .master-console-container.network-active .console-help-display {
            flex: 0 0 112px;
            min-height: 86px;
            padding: 11px 18px;
            border-color: #1f5f66;
            background:
                linear-gradient(180deg, rgba(0,229,255,0.045), rgba(0,0,0,0.25)),
                #050707;
            box-shadow:
                inset 0 0 16px rgba(0,0,0,0.85),
                0 0 14px rgba(0,229,255,0.08);
        }

        .master-console-container.network-active .help-text-content {
            font-size: 13px;
            line-height: 1.55;
            color: #c1d4d6;
        }

        .master-console-container.network-active .network-carousel-window.active,
        .master-console-container.network-active .stage-view-panel.fade-type.active {
            border: 2px solid rgba(0,229,255,0.16);
            border-radius: 13px;
            background:
                radial-gradient(circle at 50% 50%, rgba(0,229,255,0.035), transparent 42%),
                #070909;
            box-shadow:
                inset 0 0 24px rgba(0,0,0,0.80),
                inset 0 0 14px rgba(0,229,255,0.055);
            overflow: hidden;
        }

        .network-carousel-window {
            width: 100%;
            height: 100%;
            display: none;
            overflow: hidden;
            position: relative;
        }
        
        .network-carousel-window.active {
            display: block;
        }

        .network-slide-carousel {
            display: flex;
            width: 400%; 
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .network-room-cell {
            width: 25%;
            height: 100%;
        }





        /* --- Top Layout v0.3.2: DMX series outer layout correction only --- */
        .master-console-container.sim8bit-active,
        .master-console-container.simdmx-active {
            gap: 8px;
        }

        .master-console-container.sim8bit-active .console-main-screen,
        .master-console-container.simdmx-active .console-main-screen {
            aspect-ratio: 1200 / 650;
            flex: 1 1 auto;
            min-height: 0;
        }

        .master-console-container.sim8bit-active .console-help-display,
        .master-console-container.simdmx-active .console-help-display {
            flex: 0 0 112px;
            min-height: 92px;
            padding: 10px 18px;
        }

        .master-console-container.sim8bit-active .help-text-content,
        .master-console-container.simdmx-active .help-text-content {
            font-size: 13px;
            line-height: 1.45;
        }

        .master-console-container.sim8bit-active .help-text-content strong,
        .master-console-container.simdmx-active .help-text-content strong {
            color: #66e8ff;
            font-size: 13.5px;
            font-weight: 700;
            letter-spacing: 0;
            text-shadow: none;
        }

        .master-console-container.sim16bit-active {
            gap: 8px;
        }

        .master-console-container.sim16bit-active .console-main-screen {
            aspect-ratio: 1200 / 720;
            flex: 1 1 auto;
            min-height: 0;
        }

        .master-console-container.sim16bit-active .console-help-display {
            display: none !important;
        }

        .module-page-root.sim8bit,
        .module-page-root.simdmx {
            grid-template-rows: 44px minmax(0, 1fr);
            gap: 8px;
        }

        .module-page-root.sim8bit .module-page-header,
        .module-page-root.simdmx .module-page-header {
            min-height: 44px;
            padding: 6px 14px;
        }

        .module-page-root.sim8bit .module-page-title,
        .module-page-root.simdmx .module-page-title {
            font-size: 19px;
            line-height: 1.1;
        }

        .module-page-root.sim8bit .module-page-sub,
        .module-page-root.simdmx .module-page-sub {
            font-size: 11.5px;
            line-height: 1.15;
        }

        .module-page-root.sim8bit .module-page-body,
        .module-page-root.simdmx .module-page-body,
        .module-page-root.explain .module-page-body {
            overflow: hidden;
        }

        /* --- Network Layout v0.3: page headers + 50/50 lesson/simulation layout --- */
        .master-console-container.network-layout-active {
            gap: 10px;
        }
        .master-console-container.network-layout-active .console-main-screen {
            aspect-ratio: 1200 / 760;
            flex: 1 1 auto;
            min-height: 0;
        }
        .master-console-container.network-layout-active .console-help-display {
            display: none !important;
        }

        .network-lesson-root {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 10px;
            padding: 10px;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 0%, rgba(0,229,255,0.06), transparent 38%),
                #070909;
        }
        .network-lesson-root.dmxlan {
            background:
                radial-gradient(circle at 50% 0%, rgba(255,111,0,0.09), transparent 38%),
                #070909;
        }
        .network-lesson-root.broadcast {
            background:
                radial-gradient(circle at 50% 0%, rgba(255,64,129,0.09), transparent 38%),
                #070909;
        }
        .network-lesson-root.sacn {
            background:
                radial-gradient(circle at 50% 0%, rgba(0,230,118,0.09), transparent 38%),
                #070909;
        }

        .network-lesson-header,
        .module-page-header {
            min-height: 50px;
            border: 2px solid rgba(0,229,255,0.20);
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(0,229,255,0.08), rgba(0,0,0,0.25)),
                rgba(0,0,0,0.42);
            box-shadow:
                inset 0 0 18px rgba(0,0,0,0.75),
                0 0 14px rgba(0,229,255,0.06);
            padding: 9px 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            overflow: hidden;
        }
        .network-lesson-root.dmxlan .network-lesson-header { border-color: rgba(255,111,0,0.30); }
        .network-lesson-root.broadcast .network-lesson-header { border-color: rgba(255,64,129,0.28); }
        .network-lesson-root.sacn .network-lesson-header { border-color: rgba(0,230,118,0.30); }

        .network-lesson-page-title,
        .module-page-title {
            color: #fff;
            font-size: 21px;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: .02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .network-lesson-page-sub,
        .module-page-sub {
            color: #b9cacc;
            font-size: 12.5px;
            font-weight: 700;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

      }

        'sim8bit': `<strong>【8-bit 調光卓：まず左のフェーダーを動かす】</strong><br>まず左のフェーダーを上下に動かします。フェーダーの位置が 0〜255 のDMX値に変わり、その値によって見た目の明るさが変わることを確認します。0 は消灯、255 は最大です。下の8桁表示は、今のDMX値を0/1の形で見たものです。8-bitでは、8個の0/1の組み合わせで0〜255を表します。<br><strong>【8-bit 調光卓：カーブを切り替える】</strong><br>下のカーブ切替では、同じDMX値でも明るさの変化が変わることを比べます。LINEAR は直線的な出力カーブ、JATET A は2.3乗特性、JATET B は2.7乗特性です。フェーダーの数値が、そのまま人間の目に感じる明るさになるわけではないことを知る入口として扱います。`,
        'sim16bit': `<strong>【16-bit 調光卓：まずCoarseで大きく動かす】</strong><br>まずCoarseを動かして、大きな段の変化を確認します。Coarseは上位8bitで、16-bit値の大きな位置を決めます。次にFineを動かすと、その段の中をさらに細かく追い込めます。<br><strong>【16-bit 調光卓：上位8bitと下位8bitを見る】</strong><br>16bit Total は Coarse × 256 + Fine で求めます。16-bitでは、16個の0/1の組み合わせで0〜65,535を表します。Moving HeadのPAN/TILTなど、8-bitだけでは粗く見える位置制御を細かく扱うための入口です。`,
        'simdmx': `<strong>【DMX512：512chをくり返し送り続ける信号】</strong><br>DMX512は、1番から512番までのチャンネル値を順番に送り続ける信号です。値が変わっていなくても、同じ並びを約1秒間に42回くり返して送ります。受け取る機材は、自分に必要なチャンネル番号の値を読み取って動きます。`,
        'ledcolormix': `<strong>【LED色混ぜ：RGBで白は作れるのか】</strong><br>RGBを全部点けると白に近い色は作れます。ただし、その白がどんな場面でも自然に見えるとは限りません。人物の肌、衣裳、淡い色では、RGBだけだと不自然に見えることがあります。この教材では、RGB、White、Warm White、Cool White、Amber、Lime、Cyanなどのチャンネルをフェーダーで操作し、色地図上で現在の色の位置を確認しながら、LED灯具の色作りの考え方を学びます。`,
        'movinghead': `<strong>【Moving Head：PAN/TILT、キャリブレーション、16-bit位置制御】</strong><br>ムービングヘッドのPAN/TILT可動域、電源投入時のキャリブレーション、Start/End検出、キャリブレーションエラー、そして8-bitと16-bitの位置分解性能差を学ぶ教材です。16-bit比較では、8-bitでは狙った位置に止まりにくいこと、Fine値によって狙った位置へ細かく近づけられることを、ゴースト表示で確認できます。`,
        'netipaddress': `<strong>【IPアドレス：ネットワーク上の住所を合わせる】</strong><br>照明卓、Node、PCなどは、IPアドレスを使って相手を見つけます。この教材では、IPアドレスを「機器ごとの住所」として捉え、同じネットワーク、サブネットマスク、IP重複の基本を右側のシミュレーターで確認します。まずはCHALLENGEに従って数字を変え、OK / NG / ERROR がどう変わるかを見ます。`,
        'netartnet': `<strong>【Art-Net：DMXをEthernetで運ぶ考え方】</strong><br>DMX512は1系統あたり最大512chを送る信号です。劇場やイベント現場で複数のUniverseを扱う場合、DMXケーブルを何本も引く代わりに、Art-NetではDMXの値をEthernet上のUDPパケットとして送ります。これにより、1本のLAN幹線で複数Universeを扱えるようになります。ただし、運用方式によってBroadcast / Unicastなどの通信範囲が関係するため、ネットワーク規模に合わせた設計が必要です。`,
        'netbroadcast': `<strong>【Broadcast / Art-Net 1：同じネットワーク内の全Nodeへ届く】</strong><br>Broadcastは、同じネットワーク内の全機器へ向けてパケットを送る方式です。小規模な構成では分かりやすく、設定も単純にできます。一方で、Universe数や接続機器が増えると、本来そのデータを必要としないNodeにも通信が届きます。そのため、各Nodeは自分に関係するUniverseだけを受け取り、不要なデータを破棄する必要があります。大規模な照明ネットワークでは、この不要通信の増加が負荷や不安定要因になることがあります。`,
        'netsacn': `<strong>【Multicast / sACN：必要なUniverseを必要なNodeへ届ける】</strong><br>sACN（Streaming ACN）は、照明制御データをEthernet上で扱うための標準的な方式の一つです。代表的にはMulticastを使い、Universeごとに通信グループを分けて送ります。IGMP Snoopingに対応したスイッチを使うと、各Nodeが必要とするUniverseだけを適切なポートへ流しやすくなります。Broadcastのように全機器へ一律に送るのではなく、必要な相手へ必要なデータを届ける考え方として理解すると、現場での設計判断に使いやすくなります。`,
        'explain': `<strong>【結線 / 冗長化：Star構成とRing構成の違い】</strong><br>画面上の配線にある <strong>[ ✂ ] ボタン</strong>を押すと、LANケーブルの断線を再現できます。<br><strong>【左：Star結線】</strong>は、中央のHubから各Nodeへ個別に配線する基本的な構成です。1本の枝線が切れた場合、その先のNodeだけが通信できなくなります。<br><strong>【右：Ring / 二重化構成】</strong>は、複数のHubを経路でつなぎ、片側の経路が切れても別経路へ回せる考え方を示します。Primary / Secondary のような冗長経路を用意することで、1本の断線が全体停止につながりにくい構成を学べます。`
    };

    const modules = {
        'sim8bit': Module_Sim8Bit,
        'sim16bit': Module_Sim16Bit,
        'simdmx': Module_SimDmx,
        'ledcolormix': Module_LEDColorMixing,
        'movinghead': Module_MovingHead,
        'netipaddress': Module_NetIpAddress,
        'netartnet': Module_NetArtNet,
        'netbroadcast': Module_NetBroadcast,
        'netsacn': Module_NetSacn,
        'explain': Module_NetExplain
    };

    // --- Network Layout Only v0.1: 表示用データ。Moduleの通信ロジックには触れない ---
    const networkLessonPanels = {
        netartnet: [
            {

                title: "送信元では、複数のDMX Universeが別々に出ている",
                body: "まずは卓や制御元から、U1、U2、U3、U4のように複数のDMX Universeが出ています。この段階では、まだLANにまとめて運んでいるわけではありません。",
                map: "たとえ：<code>複数の列車</code> が、行き先ごとに別々に走り出す準備。"
            },
            {
                img: "assets/dmx_on_lan/dmxlan_02_packetize_v01.png",
                label: "2. LAN用パケットに包み直す",
                kicker: "DMX ON LAN POINT 2",
                title: "Universeごとに、LANで運べる形へ変換する",
                body: "DMXの値を、Ethernet上で運べるUDPパケットの形に包み直します。大きな一箱に全部を入れるのではなく、Universeごとの小包として順番に扱います。",
                map: "たとえ：<code>U1 packet</code>、<code>U2 packet</code> のように個別梱包する。"
            },
            {
                img: "assets/dmx_on_lan/dmxlan_03_lan_transport_v01.png",
                label: "3. LANはDMXよりずっと速い",
                kicker: "DMX ON LAN POINT 3",
                title: "順番に流れても、通常は見えるほどのズレになりにくい",
                body: "LAN上ではパケットが順番に流れます。ただしEthernetはDMXの更新周期よりずっと速いため、通常の規模ではU1と後続Universeのズレは見た目で問題になりにくいです。",
                map: "注意：<code>完全同時</code> ではなく、<code>高速な直列</code> として理解する。"
            },
            {
                img: "assets/dmx_on_lan/dmxlan_04_node_output_v01.png",
                label: "4. NodeでDMXとして取り出す",
                kicker: "DMX ON LAN POINT 4",
                title: "受け取ったパケットを、必要なDMX出力へ戻す",
                body: "NodeはLANで届いたUniverseのパケットを受け取り、必要なDMX Universeとして取り出します。LAN幹線で運んだデータを、現場の灯体へ向かうDMX信号に戻す段階です。",
                map: "たとえ：<code>配送された小包</code> を、出口ごとに開封してDMXへ戻す。"
            }
        ],
        netbroadcast: [
            {
                img: "assets/network/bc_01_send_v01.png",
                label: "1. 送信元がUniverseを送る",
                kicker: "BROADCAST / ART-NET 1 POINT 1",
                title: "送信側では、まだ必要／不要は決まっていない",
                body: "送信元は複数のUniverseデータをまとめてネットワークへ送り出します。この時点では、どのNodeにとって必要かどうかはまだ分かりません。",
                map: "たとえ：<code>発送元</code> が、いろいろな配布物をまとめて出す段階。"
            },
            {
                img: "assets/network/bc_02_all_v01.png",
                label: "2. 全Nodeへ同じデータが届く",
                kicker: "BROADCAST / ART-NET 1 POINT 2",
                title: "Broadcastは、全員へ同じデータを配る",
                body: "Broadcastでは、同じネットワーク内の全Nodeへ同じデータが届きます。必要なNodeにも、不要なNodeにも届くことが特徴です。",
                map: "たとえ：<code>全戸配布</code>。同じ束がすべてのポストへ入る。"
            },
            {
                img: "assets/network/bc_03_sort_v01.png",
                label: "3. Node側で必要なUniverseだけ使う",
                kicker: "BROADCAST / ART-NET 1 POINT 3",
                title: "必要／不要は、受信側で仕分ける",
                body: "各Nodeは、届いたデータの中から自分に必要なUniverseだけを使います。それ以外の不要なデータは、Node側で破棄します。",
                map: "たとえ：<code>各家庭</code> が、必要な手紙だけ取り出し、不要なチラシを捨てる。"
            },
            {
                img: "assets/network/bc_04_load_v01.png",
                label: "4. 増えると負担も増える",
                kicker: "BROADCAST / ART-NET 1 POINT 4",
                title: "規模が大きくなると、不要な通信も増える",
                body: "Broadcastはシンプルですが、Universe数やNode数が増えるほど、不要なデータも多く届きます。受け取る側の仕分け負担と、ネットワーク上の無駄な通信が大きくなります。",
                map: "たとえ：<code>ポスト</code> が折込チラシであふれ、家ごとの仕分けが追いつかなくなる。"
            }
        ],
        netsacn: [
            {
                img: "assets/sACN/sacn_01_publish_v01.png",
                label: "1. 配信開始",
                kicker: "MULTICAST / sACN POINT 1",
                title: "Universeごとに送信準備する",
                body: "sACNでは、Universeごとにデータを分けてネットワークへ流す考え方を取ります。この時点では、どのNodeが受けるかはまだ決まっていません。",
                map: "画像：<code>sacn_01_publish_v01.png</code>"
            },
            {
                img: "assets/sACN/sacn_02_igmp_join_v01.png",
                label: "2. IGMP参加",
                kicker: "MULTICAST / sACN POINT 2",
                title: "受信側が、欲しいUniverseを申告する",
                body: "Nodeや灯具側が、IGMP Joinで「このUniverseを受けたい」とSwitchへ知らせます。この時点ではまだ配送ではなく、参加申請を記録する段階です。",
                map: "画像：<code>sacn_02_igmp_join_v01.png</code>"
            },
            {
                img: "assets/sACN/sacn_03_snooping_route_v01.png",
                label: "3. 必要な相手だけへ配信",
                kicker: "MULTICAST / sACN POINT 3",
                title: "Switchが必要なポートだけへ流す",
                body: "IGMP Snoopingにより、Switchは参加リストを見て、必要なUniverseだけを必要なNodeのポートへ流します。不要な通信を減らせます。",
                map: "画像：<code>sacn_03_snooping_route_v01.png</code>"
            },
            {
                img: "assets/sACN/sacn_04_querier_check_v01.png",
                label: "4. Querier確認",
                kicker: "MULTICAST / sACN POINT 4",
                title: "参加状況を定期的に確認する",
                body: "IGMP Querierは、どのNodeがどのUniverseをまだ必要としているかを定期的に確認します。不要になった通信を止め、参加リストを保ちます。",
                map: "画像：<code>sacn_04_querier_check_v01.png</code>"
            }
        ]
    };

    const networkLessonIndex = {
        netartnet: 0,
        netbroadcast: 0,
        netsacn: 0
    };

    const networkLessonPageMeta = {
        netartnet: {
            title: "DMX on LAN｜DMXをEthernet上のパケットとして運ぶ",
            sub: "複数のDMX Universeを、LAN上のパケットとして扱う入口。"
        },
        netbroadcast: {
            title: "Broadcast / Art-Net 1｜同じネットワーク内の全Nodeへ届く",
            sub: "Broadcast的な全体配信と、受信側での仕分け負担を見る。"
        },
        netsacn: {
            title: "Multicast / sACN｜必要なUniverseを必要なNodeへ届ける",
            sub: "IGMP Snoopingを使い、必要な通信だけを必要なポートへ流す考え方。"
        }
    };

    const modulePageMeta = {
        sim8bit: {
            title: "8-bit 調光卓｜DMX値と見た目の明るさの関係を読む",
            sub: "左のフェーダーを動かし、DMX値と見た目の明るさの変化を確認する。"
        },
        simdmx: {
            title: "DMX通信列車｜512chを約42Hzで送り続ける信号",
            sub: "値が変わらなくても、DMXは定期的に全チャンネルを送り続ける。"
        },
        explain: {
            title: "結線 / 冗長化｜Star構成とRing構成の違いを比べる",
            sub: "断線時の影響範囲と、冗長経路の考え方を比較する。"
        }
    };

    function getNetworkTheme(moduleKey) {
        if (moduleKey === "netartnet") return "dmxlan";
        if (moduleKey === "netbroadcast") return "broadcast";
        return "sacn";
    }

    function setNetworkLessonPanel(moduleKey, index) {
        const list = networkLessonPanels[moduleKey];
        if (!list || !list[index]) return;
        const p = list[index];
        networkLessonIndex[moduleKey] = index;

        const label = document.getElementById(`${moduleKey}-lesson-label`);
        const img = document.getElementById(`${moduleKey}-lesson-img`);
        const placeholder = document.getElementById(`${moduleKey}-lesson-placeholder`);
        const kicker = document.getElementById(`${moduleKey}-lesson-kicker`);
        const title = document.getElementById(`${moduleKey}-lesson-title`);
        const body = document.getElementById(`${moduleKey}-lesson-body`);
        const map = document.getElementById(`${moduleKey}-lesson-map`);

        if (label) label.textContent = p.label;
        if (kicker) kicker.textContent = p.kicker;
        if (title) title.textContent = p.title;
        if (body) body.textContent = p.body;
        if (map) map.innerHTML = p.map;

        if (img) {
            if (p.img) {
                img.src = p.img;
                img.style.display = "block";
                if (placeholder) placeholder.style.display = "none";
            } else {
                img.removeAttribute("src");
                img.style.display = "none";
                if (placeholder) placeholder.style.display = "flex";
            }
        }

        document.querySelectorAll(`.network-lesson-btn[data-module="${moduleKey}"]`).forEach((btn, i) => {
            btn.classList.toggle("active", i === index);
        });

        // Network Layout v0.3.1:
        // Broadcast 4コマの教材切替と、simulation側の表示状態だけを連動復旧する。
        // packet生成・速度・到達判定・配信ロジックには使わない。
        if (moduleKey === "netbroadcast" && modules.netbroadcast && typeof modules.netbroadcast.setLessonState === "function") {
            const broadcastLessonStates = ["normal", "broadcast", "sorting", "overload"];
            modules.netbroadcast.setLessonState(broadcastLessonStates[index] || "normal");
        }
    }

    function bindNetworkLessonControls() {
        document.querySelectorAll(".network-lesson-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                setNetworkLessonPanel(btn.dataset.module, Number(btn.dataset.panel));
            });
        });
        ["netartnet", "netbroadcast", "netsacn"].forEach(key => {
            setNetworkLessonPanel(key, networkLessonIndex[key] || 0);
        });
    }

    function getNetworkLessonHTML(moduleKey, moduleHTML) {
        const theme = getNetworkTheme(moduleKey);
        const list = networkLessonPanels[moduleKey] || [];
        const first = list[0] || {};
        const meta = networkLessonPageMeta[moduleKey] || { title: "", sub: "" };
        const buttons = list.map((_, i) => {
            return `<button class="network-lesson-btn ${theme}${i === 0 ? " active" : ""}" data-module="${moduleKey}" data-panel="${i}">${i + 1}</button>`;
        }).join("");

        return `
            <div class="network-lesson-root ${theme}">
                <div class="network-lesson-header">
                    <div class="network-lesson-page-title">${meta.title}</div>
                    <div class="network-lesson-page-sub">${meta.sub}</div>
                </div>
                <div class="network-lesson-main">
                    <div class="network-lesson-left">
                        <div class="network-lesson-visual">
                            <div class="network-lesson-visual-head">
                                <div class="network-lesson-visual-title" id="${moduleKey}-lesson-label">${first.label || ""}</div>
                                <div class="network-lesson-buttons">${buttons}</div>
                            </div>
                            <div class="network-lesson-image-box">
                                <img id="${moduleKey}-lesson-img" src="${first.img || ""}" alt="${moduleKey} lesson visual" ${first.img ? "" : 'style="display:none"'} >
                                <div class="network-lesson-placeholder" id="${moduleKey}-lesson-placeholder" ${first.img ? 'style="display:none"' : ""}>教材イラスト<br>準備中</div>
                            </div>
                        </div>
                        <div class="network-lesson-text">
                            <div class="network-lesson-kicker" id="${moduleKey}-lesson-kicker">${first.kicker || ""}</div>
                            <div class="network-lesson-title" id="${moduleKey}-lesson-title">${first.title || ""}</div>
                            <div class="network-lesson-body" id="${moduleKey}-lesson-body">${first.body || ""}</div>
                            <div class="network-lesson-map" id="${moduleKey}-lesson-map">${first.map || ""}</div>
                        </div>
                    </div>
                    <div class="network-lesson-sim">${moduleHTML}</div>
                </div>
            </div>
        `;
    }

    function getModulePageHTML(moduleKey, moduleHTML) {
        const meta = modulePageMeta[moduleKey];
        if (!meta) return moduleHTML;

        return `
            <div class="module-page-root ${moduleKey}">
                <div class="module-page-header">
                    <div class="module-page-title">${meta.title}</div>
                    <div class="module-page-sub">${meta.sub}</div>
                </div>
                <div class="module-page-body">${moduleHTML}</div>
            </div>
        `;
    }


    // Network SAFE Visual Shim:
    // 表示補正だけを追加。各Network Moduleの心臓部ロジックは触らない。
    if (window.NetworkVisualSafeShim) {
        window.NetworkVisualSafeShim.install(modules);
    }

    let activeModuleKey = 'sim8bit';
    let sharedNetworkMode = 2;

    Object.keys(modules).forEach(key => {
        const panel = document.getElementById(`panel-${key}`);
        if (panel && modules[key].getHTML) {
            if (key === 'netartnet' || key === 'netbroadcast' || key === 'netsacn') {
                panel.innerHTML = getNetworkLessonHTML(key, modules[key].getHTML());
            } else if (key === 'sim16bit') {
                panel.innerHTML = `
                    <div class="sim16-integrated-root">
                        <div class="sim16-integrated-header">
                            <div class="sim16-title-card">
                                <div class="sim16-title-main">16-bit 調光卓</div>
                                <div class="sim16-title-sub">Master / Coarse / Fine を、値の二層構造として読む。</div>
                            </div>
                            <div class="sim16-concept-card" aria-label="16bit concept guide">
                                <div class="sim16-concept-pill master"><b>Master</b><span>16bit全体をまとめて動かす</span></div>
                                <div class="sim16-concept-pill coarse"><b>Coarse</b><span>大きな段を決める<br>上位8bit</span></div>
                                <div class="sim16-concept-pill fine"><b>Fine</b><span>段の中を細かく追い込む<br>下位8bit</span></div>
                            </div>
                        </div>
                        <div class="sim16-integrated-area"><div id="sim16bit-root">${modules[key].getHTML()}</div></div>
                        <div class="sim16-integrated-footer">
                            <div class="sim16-help-block"><strong>見る順番：</strong><br>まず <b>Coarse</b> を動かして、大きな段の変化を見ます。<br>次に <b>Fine</b> を動かして、その段の中を細かく動かせることを確認します。</div>
                            <div class="sim16-help-block"><strong>16bitの考え方：</strong><div class="sim16-formula"><span class="total">16bit Total</span> = <span class="coarse">Coarse</span> × 256 + <span class="fine">Fine</span></div>Coarseの1段の中を、Fineがさらに256段階に分けます。</div>
                        </div>
                    </div>
                `;
            } else if (key === 'sim8bit' || key === 'simdmx' || key === 'explain') {
                panel.innerHTML = getModulePageHTML(key, modules[key].getHTML());
            } else {
                panel.innerHTML = modules[key].getHTML();
            }
        }
    });

    bindNetworkLessonControls();

    const masterContainer = document.querySelector('.master-console-container');

    function updateMasterLayoutClass() {
        if (!masterContainer) return;
        masterContainer.classList.toggle('movinghead-active', activeModuleKey === 'movinghead');
        masterContainer.classList.toggle('sim8bit-active', activeModuleKey === 'sim8bit');
        masterContainer.classList.toggle('sim16bit-active', activeModuleKey === 'sim16bit');
        masterContainer.classList.toggle('simdmx-active', activeModuleKey === 'simdmx');
        masterContainer.classList.toggle('ledmix-active', activeModuleKey === 'ledcolormix');
        masterContainer.classList.toggle('network-active', activeModuleKey.startsWith('net') || activeModuleKey === 'explain');
        masterContainer.classList.toggle('ipaddress-active', activeModuleKey === 'netipaddress');
        masterContainer.classList.toggle('network-layout-active', activeModuleKey === 'netartnet' || activeModuleKey === 'netbroadcast' || activeModuleKey === 'netsacn');
    }

    updateMasterLayoutClass();

    if (modules[activeModuleKey] && modules[activeModuleKey].init) {
        modules[activeModuleKey].init();
    }
    document.getElementById('help-text-target').innerHTML = explanationData[activeModuleKey];

    const tabs = document.querySelectorAll('.main-tab-btn');
    const fadePanels = document.querySelectorAll('.stage-view-panel.fade-type');
    const netWindow = document.getElementById('network-carousel-window');
    const netCarousel = document.getElementById('network-slide-carousel');

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const targetKey = tab.id.replace('main-tab-', '');
            if (targetKey === activeModuleKey) return; 

            if (modules[activeModuleKey] && modules[activeModuleKey].destroy) {
                if (activeModuleKey === 'netartnet' || activeModuleKey === 'netbroadcast' || activeModuleKey === 'netsacn') {
                    sharedNetworkMode = modules[activeModuleKey].currentMode;
                }
                modules[activeModuleKey].destroy();
            }

            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            fadePanels.forEach(p => p.classList.remove('active'));
            netWindow.classList.remove('active');

            if (targetKey === 'sim8bit' || targetKey === 'sim16bit' || targetKey === 'simdmx' || targetKey === 'ledcolormix' || targetKey === 'movinghead' || targetKey === 'explain') {
                document.getElementById(`panel-${targetKey}`).classList.add('active');
            } 
            else {
                netWindow.classList.add('active');
                if (targetKey === 'netipaddress') netCarousel.style.transform = 'translateX(0%)';
                else if (targetKey === 'netartnet') netCarousel.style.transform = 'translateX(-25%)';
                else if (targetKey === 'netbroadcast') netCarousel.style.transform = 'translateX(-50%)';
                else if (targetKey === 'netsacn') netCarousel.style.transform = 'translateX(-75%)';
            }

            activeModuleKey = targetKey;
            updateMasterLayoutClass();
            document.getElementById('help-text-target').innerHTML = explanationData[activeModuleKey];
            
            if (modules[activeModuleKey] && modules[activeModuleKey].init) {
                if (activeModuleKey === 'netartnet' || activeModuleKey === 'netbroadcast' || activeModuleKey === 'netsacn') {
                    modules[activeModuleKey].currentMode = sharedNetworkMode;
                }
                const initActiveModule = () => {
                    modules[activeModuleKey].init();
                    if (activeModuleKey === 'netartnet' || activeModuleKey === 'netbroadcast' || activeModuleKey === 'netsacn') {
                        requestAnimationFrame(() => {
                            if (modules[activeModuleKey].resizeCanvas) modules[activeModuleKey].resizeCanvas();
                            setNetworkLessonPanel(activeModuleKey, networkLessonIndex[activeModuleKey] || 0);
                        });
                    }
                    if (activeModuleKey === 'movinghead') {
                        requestAnimationFrame(() => {
                            if (modules[activeModuleKey].resizeCanvas) modules[activeModuleKey].resizeCanvas();
                            if (modules[activeModuleKey].updateSystem) modules[activeModuleKey].updateSystem();
                        });
                    }
                };
                if (activeModuleKey === 'movinghead') requestAnimationFrame(initActiveModule);
                else initActiveModule();
            }
        });
    });

    // 完璧に完閉リサイズ追従
    window.addEventListener('resize', () => {
        if (modules[activeModuleKey]) {
            if (modules[activeModuleKey].resizeCanvas) modules[activeModuleKey].resizeCanvas();
            if (modules[activeModuleKey].updateSystem) modules[activeModuleKey].updateSystem();
        }
    });
</script>


<script id="index-direct-tab-open">
  (function () {
    function resolveLessonTab(raw) {
      if (!raw) return null;
      const key = String(raw).trim().toLowerCase();
      const aliases = {
        '8bit': 'sim8bit',
        'sim8bit': 'sim8bit',
        '16bit': 'sim16bit',
        'sim16bit': 'sim16bit',
        'dmx': 'simdmx',
        'simdmx': 'simdmx',
        'led': 'ledcolormix',
        'ledcolor': 'ledcolormix',
        'ledcolormix': 'ledcolormix',
        'moving': 'movinghead',
        'movinghead': 'movinghead',
        'ip': 'netipaddress',
        'ipaddress': 'netipaddress',
        'netipaddress': 'netipaddress',
        'dmxonlan': 'netartnet',
        'netartnet': 'netartnet',
        'broadcast': 'netbroadcast',
        'artnet': 'netbroadcast',
        'netbroadcast': 'netbroadcast',
        'multicast': 'netsacn',
        'sacn': 'netsacn',
        'netsacn': 'netsacn',
        'redundancy': 'netredundancy',
        'connection': 'netredundancy',
        'netredundancy': 'netredundancy'
      };
      return aliases[key] || key;
    }

    window.addEventListener('DOMContentLoaded', function () {
      const params = new URLSearchParams(window.location.search);
      const requested = resolveLessonTab(params.get('tab') || params.get('lesson') || params.get('page'));
      if (!requested) return;

      const tabButton = document.getElementById('main-tab-' + requested);
      if (!tabButton) return;

      requestAnimationFrame(function () {
        tabButton.click();
      });
    });
  })();
</script>
