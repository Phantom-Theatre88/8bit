<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Integrated Lighting & Network Console Master Top</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --panel-bg: #161616;
            --border-hand: #444444;
            --text-light: #e0e0e0;
            --accent: #ff6f00;
        }

        * {
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Roboto', 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .main-tab-container {
            display: flex;
            gap: 6px;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto 10px auto;
            flex-shrink: 0;
        }

        .main-tab-btn {
            font-family: inherit;
            font-weight: 700;
            font-size: 11px;
            padding: 10px 10px;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            -webkit-tap-highlight-color: transparent;
            flex: 1;
            text-align: center;
            white-space: nowrap;
        }

        .tab-dimmer {
            background: #1e1a17;
            border: 2px solid #3a322d;
            color: #665b55;
        }

        .tab-dimmer.active {
            background: var(--panel-bg);
            color: #ffffff;
            border-color: #ff6f00;
            border-bottom-color: var(--panel-bg);
            box-shadow: 0 -4px 12px rgba(255,111,0,0.4), 0 -2px 4px rgba(255,111,0,0.4), inset 0 1px 3px rgba(255,111,0,0.3);
            text-shadow: 0 0 6px rgba(255,111,0,0.8);
        }

        .tab-network {
            background: #141b1d;
            border: 2px solid #233134;
            color: #4e5f62;
        }

        .tab-network.active {
            background: var(--panel-bg);
            color: #ffffff;
            border-color: #00e676;
            border-bottom-color: var(--panel-bg);
            box-shadow: 0 -4px 12px rgba(0,230,118,0.4), 0 -2px 4px rgba(0,230,118,0.4), inset 0 1px 3px rgba(0,230,118,0.3);
            text-shadow: 0 0 6px rgba(0,230,118,0.8);
        }

        .tab-explain {
            background: #1a1a1a;
            border: 2px solid #333333;
            color: #555555;
        }

        .tab-explain.active {
            background: var(--panel-bg);
            color: #ffffff;
            border-color: #00e5ff;
            border-bottom-color: var(--panel-bg);
            box-shadow: 0 -4px 12px rgba(0,229,255,0.3), 0 -2px 4px rgba(0,229,255,0.3);
            text-shadow: 0 0 6px rgba(0,229,255,0.7);
        }

        .tab-separator {
            width: 2px;
            background: var(--border-hand);
            margin-top: 5px;
            height: 22px;
            flex-shrink: 0;
            opacity: 0.5;
        }

        .master-console-container {
            background-color: var(--panel-bg);
            border: 3px solid var(--border-hand);
            border-radius: 0px 20px 18px 10px/10px 18px 8px 20px;
            padding: 20px;
            width: 100%;
            max-width: 1300px;
            margin: 0 auto;
            flex-grow: 1;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow: hidden;
        }

        .console-main-screen {
            width: 100%;
            aspect-ratio: 1200 / 530; 
            position: relative;
            flex-shrink: 0; 
        }

        .console-help-display {
            width: 100%;
            flex-grow: 1; 
            background: #060606;
            border: 2px solid #333333;
            border-radius: 8px;
            padding: 12px 18px;
            overflow-y: auto; 
            box-shadow: inset 0 0 15px rgba(0,0,0,0.8);
        }

        .help-text-content {
            font-size: 11.5px;
            color: #b0b0b0;
            line-height: 1.65;
            text-align: justify;
            margin: 0;
            font-family: 'Roboto', sans-serif;
        }

        .stage-view-panel {
            width: 100%;
            height: 100%;
            display: none;
            opacity: 0;
        }

        .stage-view-panel.fade-type.active {
            display: block;
            animation: consoleFadeIn 0.25s ease-out forwards;
        }

        @keyframes consoleFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }



        /* --- MovingHead integrated layout fix v0.18.4 --- */
        .master-console-container.movinghead-active {
            gap: 10px;
        }
        .master-console-container.movinghead-active .console-main-screen {
            aspect-ratio: 1200 / 650;
            flex-shrink: 0;
        }
        .master-console-container.movinghead-active .console-help-display {
            flex: 0 0 96px;
            min-height: 78px;
            padding: 10px 18px;
        }
        .master-console-container.movinghead-active .help-text-content {
            font-size: 11px;
            line-height: 1.5;
        }

        /* --- Sim16Bit UI/UX integration v0.1: Module_Sim16Bit.js logic untouched --- */
        .master-console-container.sim16bit-active {
            gap: 10px;
        }
        .master-console-container.sim16bit-active .console-main-screen {
            aspect-ratio: 1200 / 650;
            flex-shrink: 0;
        }
        .master-console-container.sim16bit-active .console-help-display {
            flex: 0 0 108px;
            min-height: 86px;
            padding: 11px 18px;
        }
        .master-console-container.sim16bit-active .help-text-content {
            font-size: 12.5px;
            line-height: 1.55;
        }

        #panel-sim16bit.active {
            height: 100%;
        }
        .sim16-integrated-root {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            gap: 9px;
            background: #121212;
            border: 3px solid #444;
            border-radius: 18px;
            padding: 12px;
            box-shadow: 0 12px 40px rgba(0,0,0,.75);
            overflow: hidden;
        }
        .sim16-integrated-header {
            display: grid;
            grid-template-columns: 1.08fr 2fr;
            gap: 10px;
            align-items: stretch;
            min-height: 68px;
        }
        .sim16-title-card,
        .sim16-concept-card {
            background: #070707;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 9px 13px;
            box-shadow: inset 0 0 16px rgba(0,0,0,.7);
            min-width: 0;
        }
        .sim16-title-main {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: .3px;
            color: #fff;
            line-height: 1.1;
        }
        .sim16-title-sub {
            font-size: 12.5px;
            color: #aaa;
            margin-top: 5px;
            line-height: 1.35;
        }
        .sim16-concept-card {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            padding: 8px;
        }
        .sim16-concept-pill {
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 8px 10px;
            min-width: 0;
        }
        .sim16-concept-pill b {
            display: block;
            font-size: 14px;
            color: #fff;
            margin-bottom: 3px;
        }
        .sim16-concept-pill span {
            display: block;
            font-size: 12.5px;
            color: #bdbdbd;
            line-height: 1.35;
        }
        .sim16-concept-pill.master { border-left: 5px solid #ff6f00; }
        .sim16-concept-pill.coarse { border-left: 5px solid #00e5ff; }
        .sim16-concept-pill.fine { border-left: 5px solid #00e676; }
        .sim16-integrated-area {
            min-height: 0;
            background: #161616;
            border: 2px solid #3a3a3a;
            border-radius: 14px;
            padding: 11px;
            overflow: hidden;
        }
        #sim16bit-root {
            width: 100%;
            height: 100%;
        }
        #panel-sim16bit #sim16bit-root > div { gap: 16px !important; }
        #panel-sim16bit #sim16bit-root .col { min-width: 0 !important; }
        #panel-sim16bit #sim16bit-root .fader-col {
            width: 34% !important;
            padding: 12px 8px !important;
            background: #0b0b0b !important;
            border: 2px solid #343434 !important;
            border-radius: 12px !important;
            overflow: hidden !important;
        }
        #panel-sim16bit #sim16bit-root .center-col { width: 36% !important; gap: 10px !important; }
        #panel-sim16bit #sim16bit-root .bulb-col { width: 30% !important; }
        #panel-sim16bit #sim16bit-root .section-title {
            font-size: 13px !important;
            letter-spacing: 1.1px !important;
            color: #d0d0d0 !important;
            margin-bottom: 4px !important;
        }
        #panel-sim16bit #sim16bit-root .fader-bank { gap: 8px !important; }
        #panel-sim16bit #sim16bit-root .fader-cell-wrap { min-width: 72px !important; gap: 6px !important; }
        #panel-sim16bit #sim16bit-root .fader-area { height: 330px !important; width: 58px !important; }
        #panel-sim16bit #sim16bit-root .fader-scale {
            left: -1px !important;
            height: 286px !important;
            top: 22px !important;
            font-size: 12px !important;
            color: #6d6d6d !important;
        }
        #panel-sim16bit #sim16bit-root .fader-track-container {
            width: 40px !important;
            height: 286px !important;
            top: 22px !important;
            right: 1px !important;
        }
        #panel-sim16bit #sim16bit-root .fader-track {
            left: 18px !important;
            width: 5px !important;
            border-color: #3a3a3a !important;
        }
        #panel-sim16bit #sim16bit-root .fader-knob {
            width: 40px !important;
            height: 52px !important;
            border-width: 3px !important;
            box-shadow: 0 6px 12px rgba(0,0,0,.75), inset 0 1px 2px rgba(255,255,255,.55) !important;
        }
        #panel-sim16bit #sim16bit-root .step-btn {
            width: 44px !important;
            height: 34px !important;
            font-size: 13px !important;
            border-radius: 8px !important;
            touch-action: manipulation !important;
        }
        #panel-sim16bit #sim16bit-root .fader-label {
            font-size: 12px !important;
            color: #8b8b8b !important;
            letter-spacing: .2px !important;
        }
        #panel-sim16bit #sim16bit-root #sim16bit-label-master { color: #ff8a50 !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-label-coarse { color: #5eefff !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-label-fine { color: #52f5a1 !important; }
        #panel-sim16bit #sim16bit-root .digital-row { gap: 8px !important; }
        #panel-sim16bit #sim16bit-root .led-panel {
            padding: 8px 6px !important;
            border-width: 2px !important;
            border-radius: 9px !important;
            background: #040404 !important;
            min-height: 62px !important;
        }
        #panel-sim16bit #sim16bit-root .led-label {
            font-size: 11px !important;
            color: #848484 !important;
            letter-spacing: .35px !important;
        }
        #panel-sim16bit #sim16bit-root .led-num {
            font-size: 22px !important;
            line-height: 26px !important;
        }
        #panel-sim16bit #sim16bit-root #sim16bit-num-dmx { font-size: 18px !important; }
        #panel-sim16bit #sim16bit-root .panel-box {
            padding: 10px !important;
            border-radius: 10px !important;
            background: #090909 !important;
            border-color: #3e3e3e !important;
        }
        #panel-sim16bit #sim16bit-root #sim16bit-upper-graph-box { min-height: 145px !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-upper-graph-box span { font-size: 12.5px !important; }
        #panel-sim16bit #sim16bit-root #sim16bit-txt-coarse-val,
        #panel-sim16bit #sim16bit-root #sim16bit-txt-fine-val {
            font-size: 16px !important;
            font-family: 'Roboto Mono', monospace !important;
        }
        #panel-sim16bit #sim16bit-root .matrix-cell {
            min-width: 20px !important;
            height: 32px !important;
            line-height: 28px !important;
            font-size: 13px !important;
            border-radius: 5px !important;
        }
        #panel-sim16bit #sim16bit-root .dark-room {
            border-radius: 12px !important;
            border-color: #3e3e3e !important;
            overflow: hidden !important;
        }
        #panel-sim16bit #sim16bit-root .bulb-image-container {
            width: 210px !important;
            height: 340px !important;
        }
        .sim16-integrated-footer {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 10px;
            min-height: 86px;
        }
        .sim16-help-block {
            background: #060606;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 10px 14px;
            overflow: hidden;
            color: #c8c8c8;
            line-height: 1.5;
            font-size: 12.5px;
        }
        .sim16-help-block strong { color: #fff; font-size: 14px; }
        .sim16-help-block b { color: #fff; }
        .sim16-formula {
            font-family: 'Roboto Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            margin: 4px 0 3px;
            letter-spacing: .2px;
        }
        .sim16-formula .coarse { color: #00e5ff; }
        .sim16-formula .fine { color: #00e676; }
        .sim16-formula .total { color: #b388ff; }
        @media (max-width: 1050px) {
            .sim16-integrated-root { padding: 10px; gap: 8px; }
            .sim16-integrated-header { grid-template-columns: 1fr; min-height: 0; }
            .sim16-concept-card { grid-template-columns: repeat(3, 1fr); }
            .sim16-title-main { font-size: 20px; }
            .sim16-title-sub { font-size: 12px; }
            #panel-sim16bit #sim16bit-root > div { gap: 10px !important; }
            #panel-sim16bit #sim16bit-root .fader-col { width: 36% !important; }
            #panel-sim16bit #sim16bit-root .center-col { width: 34% !important; }
            #panel-sim16bit #sim16bit-root .bulb-col { width: 30% !important; }
            #panel-sim16bit #sim16bit-root .fader-area { height: 300px !important; }
            #panel-sim16bit #sim16bit-root .fader-track-container { height: 260px !important; }
            #panel-sim16bit #sim16bit-root .fader-scale { height: 260px !important; }
            .sim16-integrated-footer { grid-template-columns: 1fr; min-height: 76px; }
            .sim16-help-block { font-size: 12px; line-height: 1.42; }
        }

        /* --- Network UI v0.2.1: outer frame polish only / canvas logic untouched --- */
        .master-console-container.network-active {
            gap: 10px;
            border-color: #1f5f66;
            box-shadow:
                0 10px 40px rgba(0,0,0,0.85),
                0 0 24px rgba(0,229,255,0.10);
            background:
                radial-gradient(circle at 50% 0%, rgba(0,229,255,0.08), transparent 34%),
                linear-gradient(180deg, #151919 0%, #111 100%);
        }

        .master-console-container.network-active .console-main-screen {
            aspect-ratio: 1200 / 600;
            flex-shrink: 0;
            background:
                linear-gradient(90deg, rgba(0,229,255,0.035) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0,229,255,0.025) 1px, transparent 1px),
                #070909;
            background-size: 36px 36px;
            border-radius: 12px;
            box-shadow:
                inset 0 0 28px rgba(0,0,0,0.85),
                inset 0 0 18px rgba(0,229,255,0.08);
        }

        .master-console-container.network-active .console-help-display {
            flex: 0 0 112px;
            min-height: 86px;
            padding: 11px 18px;
            border-color: #1f5f66;
            background:
                linear-gradient(180deg, rgba(0,229,255,0.045), rgba(0,0,0,0.25)),
                #050707;
            box-shadow:
                inset 0 0 16px rgba(0,0,0,0.85),
                0 0 14px rgba(0,229,255,0.08);
        }

        .master-console-container.network-active .help-text-content {
            font-size: 12px;
            line-height: 1.55;
            color: #c1d4d6;
        }

        .master-console-container.network-active .network-carousel-window.active,
        .master-console-container.network-active .stage-view-panel.fade-type.active {
            border: 2px solid rgba(0,229,255,0.16);
            border-radius: 13px;
            background:
                radial-gradient(circle at 50% 50%, rgba(0,229,255,0.035), transparent 42%),
                #070909;
            box-shadow:
                inset 0 0 24px rgba(0,0,0,0.80),
                inset 0 0 14px rgba(0,229,255,0.055);
            overflow: hidden;
        }

        .network-carousel-window {
            width: 100%;
            height: 100%;
            display: none;
            overflow: hidden;
            position: relative;
        }
        
        .network-carousel-window.active {
            display: block;
        }

        .network-slide-carousel {
            display: flex;
            width: 300%; 
            height: 100%;
            transition: transform 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform;
        }

        .network-room-cell {
            width: 33.333333%;
            height: 100%;
        }





        /* --- Top Layout v0.3.2: DMX series outer layout correction only --- */
        .master-console-container.sim8bit-active,
        .master-console-container.simdmx-active {
            gap: 8px;
        }

        .master-console-container.sim8bit-active .console-main-screen,
        .master-console-container.simdmx-active .console-main-screen {
            aspect-ratio: 1200 / 650;
            flex: 1 1 auto;
            min-height: 0;
        }

        .master-console-container.sim8bit-active .console-help-display,
        .master-console-container.simdmx-active .console-help-display {
            flex: 0 0 92px;
            min-height: 74px;
            padding: 10px 18px;
        }

        .master-console-container.sim8bit-active .help-text-content,
        .master-console-container.simdmx-active .help-text-content {
            font-size: 11.5px;
            line-height: 1.45;
        }

        .master-console-container.sim16bit-active {
            gap: 8px;
        }

        .master-console-container.sim16bit-active .console-main-screen {
            aspect-ratio: 1200 / 720;
            flex: 1 1 auto;
            min-height: 0;
        }

        .master-console-container.sim16bit-active .console-help-display {
            display: none !important;
        }

        .module-page-root.sim8bit,
        .module-page-root.simdmx {
            grid-template-rows: 44px minmax(0, 1fr);
            gap: 8px;
        }

        .module-page-root.sim8bit .module-page-header,
        .module-page-root.simdmx .module-page-header {
            min-height: 44px;
            padding: 6px 14px;
        }

        .module-page-root.sim8bit .module-page-title,
        .module-page-root.simdmx .module-page-title {
            font-size: 19px;
            line-height: 1.1;
        }

        .module-page-root.sim8bit .module-page-sub,
        .module-page-root.simdmx .module-page-sub {
            font-size: 11.5px;
            line-height: 1.15;
        }

        .module-page-root.sim8bit .module-page-body,
        .module-page-root.simdmx .module-page-body,
        .module-page-root.explain .module-page-body {
            overflow: hidden;
        }

        /* --- Network Layout v0.3: page headers + 50/50 lesson/simulation layout --- */
        .master-console-container.network-layout-active {
            gap: 10px;
        }
        .master-console-container.network-layout-active .console-main-screen {
            aspect-ratio: 1200 / 760;
            flex: 1 1 auto;
            min-height: 0;
        }
        .master-console-container.network-layout-active .console-help-display {
            display: none !important;
        }

        .network-lesson-root {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
            gap: 10px;
            padding: 10px;
            overflow: hidden;
            background:
                radial-gradient(circle at 50% 0%, rgba(0,229,255,0.06), transparent 38%),
                #070909;
        }
        .network-lesson-root.dmxlan {
            background:
                radial-gradient(circle at 50% 0%, rgba(255,111,0,0.09), transparent 38%),
                #070909;
        }
        .network-lesson-root.broadcast {
            background:
                radial-gradient(circle at 50% 0%, rgba(255,64,129,0.09), transparent 38%),
                #070909;
        }
        .network-lesson-root.sacn {
            background:
                radial-gradient(circle at 50% 0%, rgba(0,230,118,0.09), transparent 38%),
                #070909;
        }

        .network-lesson-header,
        .module-page-header {
            min-height: 50px;
            border: 2px solid rgba(0,229,255,0.20);
            border-radius: 14px;
            background:
                linear-gradient(180deg, rgba(0,229,255,0.08), rgba(0,0,0,0.25)),
                rgba(0,0,0,0.42);
            box-shadow:
                inset 0 0 18px rgba(0,0,0,0.75),
                0 0 14px rgba(0,229,255,0.06);
            padding: 9px 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
            overflow: hidden;
        }
        .network-lesson-root.dmxlan .network-lesson-header { border-color: rgba(255,111,0,0.30); }
        .network-lesson-root.broadcast .network-lesson-header { border-color: rgba(255,64,129,0.28); }
        .network-lesson-root.sacn .network-lesson-header { border-color: rgba(0,230,118,0.30); }

        .network-lesson-page-title,
        .module-page-title {
            color: #fff;
            font-size: 21px;
            font-weight: 900;
            line-height: 1.15;
            letter-spacing: .02em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .network-lesson-page-sub,
        .module-page-sub {
            color: #b9cacc;
            font-size: 12.5px;
            font-weight: 700;
            line-height: 1.25;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .network-lesson-main {
            min-height: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 10px;
            overflow: hidden;
        }
        .network-lesson-left {
            min-height: 0;

<script>
    const explanationData = {
        'sim8bit': `<strong>【8-bit 調光制御：サイリスタ位相制御と特性カーブ】</strong><br>8-bit DMX信号は調光レベルを0〜255（256段階）の解像度で伝送します。劇場の調光器は、この数値を元にAC100V波形のサイン波を途中でぶった切る「サイリスタ位相制御」を行い、電圧をコントロールします。白熱電球のフィラメントは人間の目に対して直線的には明るくならないため、調光卓側で演出用の特性カーブ（JATET Aなど）を通し、フェーダーの直線的な動きと、実際の電球の「見た目の明るさの変化」をシンクロさせています。`,
        'sim16bit': `<strong>【16-bit 調光制御：Coarse / Fine の二層構造】</strong><br>16-bitは、上位8bitの <strong>Coarse</strong> で大きな段を決め、下位8bitの <strong>Fine</strong> でその段の中をさらに細かく追い込みます。考え方は <strong>16bit Total = Coarse × 256 + Fine</strong>。8-bitの256段階だけでは粗く見える位置制御や低レベルフェードを、65,536段階まで細かく扱うための入口です。Moving HeadのPAN/TILT精度比較へつながります。`,
        'simdmx': `<strong>【DMX512伝送：1秒間に42回走る定期列車】</strong><br>DMX512信号は、1番から512番までの全チャンネルデータを乗せた「512両編成の超ロングな列車」です。劇場内の調光卓は、オペレーターがフェーダーを一切触っていなくても、値が変化していなくても関係なく、1秒間に約42回（42Hz周波数）の超スピードで、この定期列車を劇場内へ絶え間なく垂れ流しで送り続けています。信号を受け取る灯体側は、常に自分のチャンネル番号の車両（パルス波形）が通りかかるのを待ち構えてデータを抜き出しています。`,
        'movinghead': `<strong>【Moving Head：PAN/TILT、キャリブレーション、16-bit位置制御】</strong><br>ムービングヘッドのPAN/TILT可動域、電源投入時のキャリブレーション、Start/End検出、キャリブレーションエラー、そして8-bitと16-bitの位置分解性能差を学ぶ教材です。16-bit比較では、8-bitでは狙った位置に止まりにくいこと、Fine値によって狙った位置へ細かく近づけられることを、ゴースト表示で確認できます。`,
        'netartnet': `<strong>【Art-Net：DMXをEthernetで運ぶ考え方】</strong><br>DMX512は1系統あたり最大512chを送る信号です。劇場やイベント現場で複数のUniverseを扱う場合、DMXケーブルを何本も引く代わりに、Art-NetではDMXの値をEthernet上のUDPパケットとして送ります。これにより、1本のLAN幹線で複数Universeを扱えるようになります。ただし、運用方式によってBroadcast / Unicastなどの通信範囲が関係するため、ネットワーク規模に合わせた設計が必要です。`,
        'netbroadcast': `<strong>【Broadcast / Art-Net 1：同じネットワーク内の全Nodeへ届く】</strong><br>Broadcastは、同じネットワーク内の全機器へ向けてパケットを送る方式です。小規模な構成では分かりやすく、設定も単純にできます。一方で、Universe数や接続機器が増えると、本来そのデータを必要としないNodeにも通信が届きます。そのため、各Nodeは自分に関係するUniverseだけを受け取り、不要なデータを破棄する必要があります。大規模な照明ネットワークでは、この不要通信の増加が負荷や不安定要因になることがあります。`,

    function getNetworkTheme(moduleKey) {
        if (moduleKey === "netartnet") return "dmxlan";
        if (moduleKey === "netbroadcast") return "broadcast";
        return "sacn";
    }

    function setNetworkLessonPanel(moduleKey, index) {
        const list = networkLessonPanels[moduleKey];
        if (!list || !list[index]) return;
        const p = list[index];
        networkLessonIndex[moduleKey] = index;

        const label = document.getElementById(`${moduleKey}-lesson-label`);
        const img = document.getElementById(`${moduleKey}-lesson-img`);
        const placeholder = document.getElementById(`${moduleKey}-lesson-placeholder`);
        const kicker = document.getElementById(`${moduleKey}-lesson-kicker`);
        const title = document.getElementById(`${moduleKey}-lesson-title`);
        const body = document.getElementById(`${moduleKey}-lesson-body`);
        const map = document.getElementById(`${moduleKey}-lesson-map`);

        if (label) label.textContent = p.label;
        if (kicker) kicker.textContent = p.kicker;
        if (title) title.textContent = p.title;
        if (body) body.textContent = p.body;
        if (map) map.innerHTML = p.map;

        if (img) {
            if (p.img) {
                img.src = p.img;
                img.style.display = "block";
                if (placeholder) placeholder.style.display = "none";
            } else {
                img.removeAttribute("src");
                img.style.display = "none";
                if (placeholder) placeholder.style.display = "flex";

        // Network Layout v0.3.1:

    bindNetworkLessonControls();

    const masterContainer = document.querySelector('.master-console-container');

    function updateMasterLayoutClass() {
        if (!masterContainer) return;

            const targetKey = tab.id.replace('main-tab-', '');
            if (targetKey === activeModuleKey) return; 

            if (modules[activeModuleKey] && modules[activeModuleKey].destroy) {
                if (activeModuleKey.startsWith('net')) {
                    sharedNetworkMode = modules[activeModuleKey].currentMode;
                }
                modules[activeModuleKey].destroy();
            }

            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            fadePanels.forEach(p => p.classList.remove('active'));
            netWindow.classList.remove('active');

            if (targetKey === 'sim8bit' || targetKey === 'sim16bit' || targetKey === 'simdmx' || targetKey === 'movinghead' || targetKey === 'explain') {
                document.getElementById(`panel-${targetKey}`).classList.add('active');

            }

            activeModuleKey = targetKey;
            updateMasterLayoutClass();
            document.getElementById('help-text-target').innerHTML = explanationData[activeModuleKey];
            
            if (modules[activeModuleKey] && modules[activeModuleKey].init) {
                if (activeModuleKey.startsWith('net')) {
                    modules[activeModuleKey].currentMode = sharedNetworkMode;

                const initActiveModule = () => {
