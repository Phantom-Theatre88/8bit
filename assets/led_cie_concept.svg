<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveAspectRatio="none">
  <defs>
    <path id="cieShape" d="M 23 96 C 15 92, 9 80, 7 64 C 5 48, 7 31, 13 18 C 19 7, 29 3, 40 7 C 53 12, 66 27, 78 43 C 86 54, 91 64, 94 69 L 80 77 C 63 86, 43 93, 23 96 Z"/>
    <clipPath id="cieClip">
      <path d="M 23 96 C 15 92, 9 80, 7 64 C 5 48, 7 31, 13 18 C 19 7, 29 3, 40 7 C 53 12, 66 27, 78 43 C 86 54, 91 64, 94 69 L 80 77 C 63 86, 43 93, 23 96 Z"/>
    </clipPath>

    <radialGradient id="whiteCore" cx="47%" cy="58%" r="26%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="44%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="greenArea" cx="20%" cy="15%" r="48%">
      <stop offset="0%" stop-color="#00ff4a" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00ff4a" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="cyanArea" cx="10%" cy="54%" r="44%">
      <stop offset="0%" stop-color="#00eaff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#00eaff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="blueArea" cx="24%" cy="90%" r="40%">
      <stop offset="0%" stop-color="#2148ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#2148ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="redArea" cx="92%" cy="68%" r="48%">
      <stop offset="0%" stop-color="#ff2438" stop-opacity="1"/>
      <stop offset="100%" stop-color="#ff2438" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="yellowArea" cx="56%" cy="23%" r="42%">
      <stop offset="0%" stop-color="#ffff2f" stop-opacity="0.96"/>
      <stop offset="100%" stop-color="#ffff2f" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="magentaArea" cx="55%" cy="78%" r="42%">
      <stop offset="0%" stop-color="#ff2bd6" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#ff2bd6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="100" height="100" fill="none"/>

  <g clip-path="url(#cieClip)">
    <rect width="100" height="100" fill="#070a12"/>
    <rect width="100" height="100" fill="url(#greenArea)"/>
    <rect width="100" height="100" fill="url(#cyanArea)"/>
    <rect width="100" height="100" fill="url(#blueArea)"/>
    <rect width="100" height="100" fill="url(#redArea)"/>
    <rect width="100" height="100" fill="url(#yellowArea)"/>
    <rect width="100" height="100" fill="url(#magentaArea)"/>
    <rect width="100" height="100" fill="url(#whiteCore)"/>
  </g>

  <use href="#cieShape" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="1.15" vector-effect="non-scaling-stroke"/>
</svg>
